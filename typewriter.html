<!DOCTYPE html>
<html>
<body>

<h1>Typewriter</h1>

<p id="demo">Here</p>

<button onclick="typeWrite()">Read More</button>



<script>

function typeWrite(){

var i = 0;
var txt = 'Capítulo 1: sksks ' + "<br>" + "descripcion";
var speed = 50;
var demo = document.getElementById("demo");

if (demo.value != ""){
  
    //demo.innerHTML = "";
  	demo.innerHTML += "<br/>";
  
  }

function typeWriter() {
  
  
  
  
  if (i < txt.length) {
    demo.innerHTML += txt.charAt(i);
    i++;
    setTimeout(typeWriter, speed);
  }
  
    
  

}

typeWriter();

//document.getElementById("demo").innerHTML ="";
}
</script>

</body>
</html>
