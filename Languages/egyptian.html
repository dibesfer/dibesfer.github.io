<body>

<div id="showbox"></div>
	
	<center><i>Made by <a href="https://dibesfer.com">dibesfer</a></i></center>
	<center><i>Resources <a href="http://xahlee.info/comp/unicode_egyptian_hieroglyph.html">here</a></i></center>
	
</body>

<script>

	var glyphs = ["𓀞", "𓀟", "𓀠",
    "𓅰", "𓅯", "𓅮" ]
	var showbox = getid("showbox")
	var index = 0;

	function change_glyph(){
    
    	if (index < glyphs.length - 1){
    
    		index++;
        
        }
    
    	else {
        
        	index=0;
        
        }
        
        showbox.innerHTML = glyphs[index];
    
    }

    setInterval("change_glyph()",200);


</script>
