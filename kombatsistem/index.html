	flex: 50%;
    max-width: 50%;
    background-color: ;

}

  color: ;

	border: solid 3px gold;

}

<body>

<center><h1>Kombat Sistem</h1></center>


<div id="KombatSistem">

<div id="screen">

<div class="faiter">
<div class="stats">
</div><!-- END stats-->

<div id="player-hp">
100/100
</div><!-- END hp-->

<div id="player-hpbar">

</div><!-- END hpbar-->

<h2>Aurelio</h2>
<img src="https://freepikpsd.com/wp-content/uploads/2019/10/fighter-png-Transparent-Images.png" width="100%">
</div><!-- END faiter-->

<div class="faiter">

<div id="enemy-hp">
100/100

</div><!-- END enemy-hp-->
<div id="enemy-hpbar">
</div><!-- END enemy-hpbar-->

<h2>Gerónimo</h2>
<img src="https://lh3.googleusercontent.com/proxy/hqPRvjJR_u-LSnM8CTccxDHYjcH9J503E4nfhcnstvvKtMXrYNXVi2Aw4NAmACxsjNXUaQcOxmAwHwX76mNDiSGZU9qf9QrOO50Ji0c81JXr4ykspe3Su7Mj54SMmJPidm1C7WGiHOeLjlldaA" width="100%">
</div><!-- END faiter-->



</div><!-- END screen-->

<div id="console">

<p>Enter input</p>

</div><!-- END console-->


<button id="btn" onclick="attack()">Attack!</button>

</div><!-- END KombatSistem-->
<center><i><h3>by dibesfer</h3></i></center>


<script>

function getRndInteger(min, max) {
  return Math.floor(Math.random() * (max - min + 1) ) + min;
}

function getid(s){

	return document.getElementById(s);

}

class character {

	constructor(name,hp){
    	
        this.name = name;
        this.hp = hp;
    }
    
    tostring(){
    
    	return "Name: " + this.name + " HP: " + this.hp;
     
    }

}

var player = new character("Aurelius",100);
var enemy = new character("Geronimus",100);

function attack(){
	
    var damage1 = getRndInteger(0,10);
    var damage2 = getRndInteger(0,10);
	var consol = getid("console");
    var playerhp = getid("player-hp");
    var playerhpbar = getid("player-hpbar");
    var enemyhp = getid("enemy-hp");
    var enemyhpbar = getid("enemy-hpbar");
    
    if (player.hp > 0 && enemy.hp > 0){
    consol.innerHTML = player.name + " attacked " + enemy.name + " causing " + damage1 + " damage points. ";
   	enemy.hp -= damage1;
    
    enemyhp.innerText = enemy.hp + "/100";
    enemyhpbar.style.width = enemy.hp + "%";
    
    consol.innerHTML += enemy.name + " attacked back " + player.name + " causing " + damage2 + " damage points. ";
   	player.hp -= damage2;
    
    consol.innerHTML += player.tostring();
	consol.innerHTML += enemy.tostring();
    
    playerhp.innerText = player.hp + "/100";
    playerhpbar.style.width = player.hp + "%";
    }
    
    else if (player.hp <= 0){
    
    	consol.innerHTML = enemy.name + " won!";
        btn.innerHTML = "Start Again" ;
    
    }
    
    else {
    
    	consol.innerHTML = player.name + " won!";
    	        btn.innerHTML = "Start Again" ;

    }
    
}



</script>

</body>
