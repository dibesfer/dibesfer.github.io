<body>

<center><h1>Kombat Sistem</h1></center>


<div id="KombatSistem">

<div id="screen">

<div class="faiter">
<div class="stats">
</div><!-- END stats-->

<div id="player-hp">
<div id="player-hpbar">
100/100
</div><!-- END hpbar-->
</div><!-- END hp-->

<h2>Aurelio</h2>
<img src="https://freepikpsd.com/wp-content/uploads/2019/10/fighter-png-Transparent-Images.png" width="100%">
</div><!-- END faiter-->

<div class="faiter">

<div id="enemy-hp">
<div id="enemy-hpbar">
100/100
</div><!-- END hpbar-->
</div><!-- END hp-->

<img src="https://assets.stickpng.com/images/580b57fcd9996e24bc43c342.png" width="100%">
</div><!-- END faiter-->



</div><!-- END screen-->

<div id="console">

<p>Enter input</p>

</div><!-- END console-->


<button class="btn" onclick="attack()">Attack!</button>

</div><!-- END KombatSistem-->
<center><i><h3>by dibesfer</h3></i></center>


<script>

function getRndInteger(min, max) {
  return Math.floor(Math.random() * (max - min + 1) ) + min;
}

function getid(s){

	return document.getElementById(s);

}

class character {

	constructor(name,hp){
    	
        this.name = name;
        this.hp = hp;
    }
    
    tostring(){
    
    	return "Name: " + this.name + " HP: " + this.hp;
     
    }

}

var player = new character("Aurelius",100);
var enemy = new character("Geronimus",100);

function attack(){
	
    var damage1 = getRndInteger(0,10);
    var damage2 = getRndInteger(0,10);
	var consol = getid("console");
    var playerhpbar = getid("player-hpbar");
    var enemyhpbar = getid("enemy-hpbar");
    
    
    consol.innerHTML = player.name + " attacked " + enemy.name + " causing " + damage1 + " damage points. ";
   	enemy.hp -= damage1;
    
    playerhpbar.innerHTML = player.hp + "/100";
    
    consol.innerHTML += enemy.name + " attacked back " + player.name + " causing " + damage2 + " damage points. ";
   	player.hp -= damage2;
    
    consol.innerHTML += player.tostring();
	consol.innerHTML += enemy.tostring();
    
    enemyhpbar.innerHTML = enemy.hp + "/100";
}



</script>

</body>
