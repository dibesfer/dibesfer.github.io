<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        #galleryFlex {
            display: flex;
            flex-wrap: wrap;
        }

        #galleryFlex>div {
            flex: 33%;
            width: 33%;
            aspect-ratio: 1;
            border: 2px solid;
            background-color: rgba(65, 65, 65, 0.506);
        }

        #galleryFlex>div>img {
            display: block;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <main>
        <div class="maxWidth">
            <h2>Gallery</h2>
            <iframe style="width: 100%;aspect-ratio: 16/9;" src="/web/Three/Model Viewer/3dRotate.html"
                frameborder="0"></iframe>
            <p>Soon to implement: <a href="/web/experimental/dialogueSystem/">dialogueSystem</a></p>
            <iframe width="100%" height="70px" src="/web/Music" frameborder="0"></iframe>

            <iframe width="100%" style="height: 8rem;" src="/web/dibesfer_ads/" frameborder="0"></iframe>

            <div id="galleryFlex">
                <div><img src="/assets/art/dibesfer/coleccion.jpg" alt=""></div>
                <div><img src="/assets/art/minetest/minitest.png" alt=""></div>
                <div><img src="/assets/art/pixelArt/mandala-mastodon.png" alt=""></div>
                <div><img src="/assets/branding/fergames-logo.png" alt=""></div>
                <div><img src="/assets/gif/sketch2026.gif" alt="dibesfer gif collection of sketches"></div>
                <div><img src="/assets/branding/monochat-logo.png" alt=""></div>
                <div><img src="/assets/art/dibesfer/meeting.jpg" alt=""></div>
                <div><img src="/assets/art/mandalas/unum.png" alt=""></div>

                <div><img src="/assets/art/dibesfer/mandala.jpg" alt=""></div>
            </div>

        </div>

    </main>
</body>

</html>
