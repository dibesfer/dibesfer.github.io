<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dibesfer nav</title>
    <link rel="shortcut icon" href="../../branding/favicon512.ico" type="image/x-icon">
    <link rel="stylesheet" href="../../../style.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="headBar">
        <div>
            <img id="leftBarBtn" class="invertable icon" src="../../branding/dibesfer-logo.png" alt="">
        </div>
        <div>
            <a href=""><img src="../../branding/dibesfer-title.png" alt="" class="invertable icon"></a>
        </div>
        <div>
            <img id="rightBarBtn" src="../../branding/fer-logo.png" alt="" class="invertable icon">
        </div>
    </header>

    <main>
        <div id="navBars">
            <div id="leftBar">
                <div>Main</div>
                <div>Gallery</div>
                <div>Games</div>
                <div>Web</div>
            </div>
            <div id="rightBar" class="textCenter">
                <img style="width: 150px; display: block;margin: auto;" src="../../portrait/me-cartoon.png"
                    alt="Selfportrait in digital art">
                <p>Ferrán Minero</p>
                <p><i>Barcelona, 1996</i></p>
                <img style="width: 150px; display: block;margin: auto;"
                    src="https://dibesfer.codeberg.page/art/selfportrait/me.png" alt="Selfportrait in digital art">
                <p>Digital artist and developer.</p>
                <img class="invertable" style="width: 150px; display: block;margin: auto;"
                    src="../../branding/fer-logo.png" alt="Fer silhouette logo">
                <p>Languages: Español, Català, English</p>
                <hr>
                <br>
                <div
                    style="margin: auto;max-width: 100%; display: flex; justify-content: center; align-items: center;height: 100%; max-height:40px;flex-wrap: wrap;">

                    <img class="invertable icon pixel" height="100%"
                        src="https://dibesfer.codeberg.page/img/dibesfer-pixel-logo.png" alt="dibesfer pixel logo">
                    <span style="margin: 0 5px">by</span>
                    <img src="https://dibesfer.codeberg.page/img/dibesfer-pixel-title.png" alt=""
                        class="icon pixel invertable" height="100%">
                </div>

            </div>
        </div>
        </div>
        <iframe id="myIframe" src="../../gallery" frameborder="0"></iframe>
    </main>

    <footer id="bottomBar">
        <div>
            FULL SCREEN
        </div>
        <p>dibesfer@gmail.com</p>
        <div>
            UP
        </div>
    </footer>
    <script src="script.js"></script>
</body>

</html>
