
<!DOCTYPE html>
<html>

<head>
<style>
#slider {
    opacity:1;
    transition: opacity 1s; 
}

#slider.fadeOut {
    opacity:0;
}

</style>
</head>


<body>

<div id="slider" width="100%" height="400px"/></div>
  
  <center> </a href="/jqueryfade.html"> Version jQuery fadeToggle() 2</a> </center>

<script>
var imgArray = [
    'Hii',
    'How are you?',
    'Hope you are fine.'
    
    ],
    curIndex = 0;
    imgDuration = 3000;

function slideShow() {
    document.getElementById('slider').className += "fadeOut";
    setTimeout(function() {
        document.getElementById('slider').innerHTML = imgArray[curIndex];
        document.getElementById('slider').className = "";
    },1000);
    curIndex++;
    if (curIndex == imgArray.length) { curIndex = 0; }
    setTimeout(slideShow, imgDuration);
}
slideShow();
</script>
</body>

</html>
