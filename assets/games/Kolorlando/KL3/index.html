<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KL3</title>
    <link rel="shortcut icon" href="./assets/branding/KoloraSimbolo_Square_512.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="ThreeD">
        <canvas id="threeDCanvas"></canvas>
    </div>

    <div id="UI">
        <div id="chat">
            <p id="consola">FPS: 00 XYZ: 0, 50, 2.69</p>
            <div id="chatBox">
                20:56 System: Hello world!
            </div>
            <input type="text" id="chatInput" placeholder="Write here...">
        </div>

        <div id="crosshair">
            +
            <!-- other cool symbols · + ⊹ 🞶 ⊕ [+] ⬢ ⬡-->
        </div>

        <div id="menu">
            <div id="menuTabs">
                <div data-page="woxel">Woxel</div>
                <div data-page="boxels">Boxels</div>
                <div data-page="voxels">Voxels</div>
                <div data-page="settings">Settings</div>
                <div data-page="about">About</div>
            </div>
            <div id="menuContent">

            </div>
        </div>

        <div id="playerHUD">
            <p id="targetNameP">Target: <span id="targetName">none</span></p>
            <div id="hotbar"></div>
        </div>

        <div id="joysticksMount"></div>

    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
