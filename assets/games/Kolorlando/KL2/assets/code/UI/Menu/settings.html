<div class="menuPanel">
    <div class="menuActions">
        <button type="button" data-action="reload-world">Reload World</button>
        <button type="button" data-action="export-woxel">Export</button>
        <button type="button" data-action="load-woxel">Load woxel</button>
    </div>

    <input type="file" data-action="load-woxel-file" accept=".woxel,application/json,application/octet-stream" hidden>

    <label class="settingField">
        <span>Undersampling</span>
        <select data-setting="undersampling">
            <option value="100">100%</option>
            <option value="75">75%</option>
            <option value="50">50%</option>
            <option value="25">25%</option>
            <option value="10">10%</option>
            <option value="5">5%</option>
        </select>
    </label>

    <label class="settingField">
        <span>Render Budget</span>
        <select data-setting="render-budget">
            <option value="LOW">Low</option>
            <option value="MEDIUM">Medium</option>
            <option value="HIGH">High</option>
        </select>
        <span data-ui="render-budget-info">48 visible chunks</span>
    </label>

    <label class="settingField">
        <span>Chunk Render Distance</span>
        <input type="number" data-setting="chunk-render-distance" min="15" max="9999" step="15" value="60">
        <span data-ui="chunk-render-distance">60 voxels</span>
    </label>

    <label class="settingToggle">
        <input type="checkbox" data-setting="lod-enabled">
        <span>LOD enabled</span>
    </label>

    <label class="settingField">
        <span>LOD Full Distance</span>
        <input type="number" data-setting="lod-full-distance" min="0" max="180" step="5" value="30">
        <small data-ui="lod-full-distance">30 voxels</small>
    </label>

    <label class="settingField">
        <span>LOD Medium Distance</span>
        <input type="number" data-setting="lod-medium-distance" min="0" max="360" step="5" value="90">
        <small data-ui="lod-medium-distance">90 voxels</small>
        <small data-ui="lod-info">LOD OFF by default | FULL 0-30 | MEDIUM 30-90 | MINIMAL 90+</small>
        <button type="button" data-action="apply-lod-settings">Apply LOD distances</button>
    </label>

    <label class="settingField">
        <span>Camera FOV</span>
        <input type="number" data-setting="camera-fov" min="45" max="100" step="1" value="72">
    </label>

    <label class="settingToggle">
        <input type="checkbox" data-setting="pixelated-upscale">
        <span>Pixelated upscale</span>
    </label>

    <label class="settingToggle">
        <input type="checkbox" data-setting="wireframe-mode">
        <span>Wireframe mode</span>
    </label>

    <label class="settingToggle" data-ui="wireframe-vertex-colors-field" hidden>
        <input type="checkbox" data-setting="wireframe-vertex-colors">
        <span>Vertex color</span>
    </label>

    <button type="button" data-action="restore-settings">Restore Defaults</button>
</div>
