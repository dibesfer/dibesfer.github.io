  <title
     id="title">Kolorlando major systems mind map</title>
  <desc
     id="desc">A semantic map of Kolorlando systems grouped around the game nucleus.</desc>
  <defs
     id="defs1">
    <marker
       id="arrow"
       viewBox="0 0 10 10"
       refX="9"
       refY="5"
       markerWidth="5"
       markerHeight="5"
       orient="auto-start-reverse">
      <path
         d="M 0,0 10,5 0,10 Z"
         class="arrowHead"
         id="path1" />
    </marker>
    <style
       id="style1">
            .canvas {
                fill: #808080;
            }

            .link {
                fill: none;
                stroke: #050505;
                stroke-width: 4;
                stroke-linecap: round;
                stroke-linejoin: round;
                marker-end: url(#arrow);
            }

            .nodeShape {
                stroke: #050505;
                stroke-width: 4;
            }

            .nodeText {
                fill: #050505;
                font-family: monospace;
                font-size: 16px;
                text-anchor: middle;
                dominant-baseline: middle;
            }

            .nucleusText {
                font-size: 16px;
            }

            .nucleus {
                fill: #e53935;
            }

            .ui,
            .item,
            .entity,
            .player,
            .multiplayer,
            .web,
            .world,
            .voxel,
            .commands,
            .audio,
            .memory {
                fill: #f28c28;
            }

            .icon,
            .inventory,
            .auth,
            .camera,
            .screen,
            .input,
            .map,
            .boxel {
                fill: #f6d743;
            }

            .arrowHead {
                fill: #050505;
            }
        </style>
