<h2>Load</h2>
<div>Import from a file</div>
<input type="file" name="" id="loadVoxelFileInput" accept=".voxel,.json,application/json,application/octet-stream">
<div>Import from text (JSON)</div>
<textarea id="loadJsonInput" style="resize: none;" name="" cols="40" rows="6"></textarea>
<div>Use a template</div>
<label for="loadVoxelSizeInput">Microxel size</label>
<input type="number" name="" id="loadVoxelSizeInput" min="1" max="64" step="1" value="15">
<br>
<input type="radio" name="loadTemplate" id="templateEmpty" value="empty">
<label for="templateEmpty">Empty</label>
<input type="radio" name="loadTemplate" id="templateFull" value="full" checked>
<label for="templateFull">Full</label>
<input type="radio" name="loadTemplate" id="templateRandom" value="random">
<label for="templateRandom">Random</label>
<br>
<button id="loadJsonButton">Load</button>
<p id="loadStatus"></p>
