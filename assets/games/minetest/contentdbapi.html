<body>
    <div id="loadingScreen" class="flexCenter fullScreen">
        <img width="200px" class="icon" src="/img/dibesfer-logo.png" alt="dibesfer logo">
    </div>
    <!-- <header class="flexBetween"></header> -->
    <div id="navBars">

    </div>

    <main>
        <section class="maxWidth">


            <h1 class="textCenter">ContentDB Api</h1>
            <p>Total mods: <span id="totalMods"></span></p>
            <p>Total games: <span id="totalGames"></span></p>
            <p>Top contributed games:</p>
            <p>top contributor (num of mods)</p>
            <p>All modders:</p>
            <ol id="allModders">
 
            </ol>
           
        <p><a href="https://content.luanti.org/help/api/" target="_blank">Help Api</a></p>
        <script>
            let moddersObjects = []
            let modders = []
            let modCount = []
            let apiPackages
        function readJson () {
            //fetch('https://content.minetest.net/api/dependencies/?page=2')
            //https://content.minetest.net/api/packages/?type=game
           fetch('https://content.luanti.org/api/packages/')
           //,{method: 'get'})
           .then(response => {
               if (!response.ok) {
                   throw new Error("HTTP error " + response.status);
               }
            return response.json();
               
           })
           .then(json => {
               apiPackages = json
               
               totalMods.textContent = json.length

               let newjson = json.filter(item => item.type == "game")
                totalGames.textContent = newjson.length
               console.log(newjson)
               
               apiPackages.forEach(element => {
                if (!modders.includes(element.author)){
                    //modderObject.name = element.author
                    modders.push(element.author)
                    modCount.push(1)
                }
                else {
                    modCount[modders.indexOf(element.author)]++
                }
               });
               //console.log(modders)
               //console.log(modCount)
               for (let i = 0; i < modders.length; i++) {
                moddersObjects.push({name : modders[i], packageCount : modCount[i]})               
               }
               moddersObjects.sort(function(a, b){
                    return  b.packageCount - a.packageCount;
                });
               moddersObjects.forEach(element => {
                allModders.innerHTML += "<li>" + element.name + ": " + element.packageCount + "</li>"
               });
               console.log(apiPackages)
               
               //document.write(this);
           })
           .catch(function () {
               this.dataError = true;
               //document.write("nope");
           })
        }
        readJson()
        </script>

        <footer></footer>
    </main>
    <script src="/script.js"></script>
    <script src="/scripts/supabase.js"></script>
