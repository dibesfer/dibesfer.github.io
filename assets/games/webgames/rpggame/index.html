<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Game</title>
    <script src="/ferscript.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>RPG Game</h1>
    
    <h3 id="displayUsername">What is your name?</h3>
    <h3  id="clock" >Clock: <span id="clockValue">00:00:00</span></h3>
    <div id="getUsername">
        <input type="text" name="username" id="inputUsername">
        <button id="buttonUsername">Submit</button>
    </div>
    <div id="userStats">
        <p>Health: 100/100</p>
        <p>Hunger: 100/100</p>
        <p>Energy: 100/100</p>
    </div>
    <div id="actions">
        <h3>What do you want to do?</h3>
        <p>Training</p>
        <p>Fight</p>
        <p>Eat</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
