    <div class="bar">

    <h1>Clicks</h1>
    <div id="consola"></div>
    <h1 style="color: black; text-shadow: 0px 0px 4px white ;">HELLO WORLD</h1>
    <script>
        var counter = 0
        var consola = getid("consola")
        var bar2 = getid("bar2")
        function intervalFunction(){
            counter++
            consola.textContent = counter
            bar2.style.width = counter + "%"
            if (counter == 100){
                counter = 0
            }
        }

        var myInterval = setInterval(intervalFunction, 1000)

    </script>
