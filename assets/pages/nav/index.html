<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dibesfer nav</title>
    <link rel="shortcut icon" href="../../branding/favicon512.ico" type="image/x-icon">
    <link rel="stylesheet" href="../../../style.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="headBar">
        <div>
            <img id="leftBarBtn" class="invertable icon clickable" src="/assets/branding/dibesfer-logo.svg" alt="dibesfer logo svg">
        </div>
        <div>
            <a href="index.html"><img src="../../branding/dibesfer-title.png" alt="" class="invertable icon"></a>
        </div>
        <div>
            <img id="rightBarBtn" src="/assets/branding/fer-logo.svg" alt="" class="invertable icon clickable">
        </div>
    </header>

    <main>
        <div id="navBars">
            <div id="leftBar">
                <div><a href="../../../" class="leftBarLink">Landing</a></div>
                <div class="leftBarLink" data-iframe-link="gallery">Gallery</div>
                <div class="leftBarLink" data-iframe-link="games">Games</div>
                <div class="leftBarLink" data-iframe-link="web">Web</div>
                <div><a href="https://liberapay.com/dibesfer" class="leftBarLink">Donate</a></div>
                <div><a href="https://discord.gg/tUHBS9eERn" class="leftBarLink">Discord</a></div>
                
            </div>
            <div id="rightBar" class="textCenter">
                <img style="width: 150px; display: block;margin: auto;" src="../../portrait/me-cartoon.png"
                    alt="Selfportrait in digital art">
                <p>Ferrán Minero</p>
                <p><i>Barcelona, 1996</i></p>
                <img style="width: 150px; display: block;margin: auto;"
                    src="https://dibesfer.codeberg.page/art/selfportrait/me.png" alt="Selfportrait in digital art">
                <p>Digital artist and developer.</p>
                <img class="invertable" style="width: 150px; display: block;margin: auto;"
                    src="../../branding/fer-logo.png" alt="Fer silhouette logo">
                <p>Languages: Español, Català, English</p>
                <hr>
                <br>
                <div
                    style="margin: auto;max-width: 100%; display: flex; justify-content: center; align-items: center;height: 100%; max-height:40px;flex-wrap: wrap;">

                    <img class="invertable icon pixel" height="100%"
                        src="https://dibesfer.codeberg.page/img/dibesfer-pixel-logo.png" alt="dibesfer pixel logo">
                    <span style="margin: 0 5px">by</span>
                    <img src="https://dibesfer.codeberg.page/img/dibesfer-pixel-title.png" alt=""
                        class="icon pixel invertable" height="100%">
                </div>

            </div>
        </div>

        <iframe id="myIframe" src="" frameborder="0"></iframe>
    </main>

    <footer id="bottomBar">
        <div id="fullScreenBtn">
            <img class="invertable icon clickable" src="../../icons/fullscreen.png" alt="fullscreen button">
        </div>
        <div style="line-height: 1; text-overflow:ellipsis;overflow:hidden;white-space: nowrap; ">dibesfer@gmail.com</div>
        <div class="icon clickable" id="goDownBtn">▼</div>
    </footer>
    <script src="script.js"></script>
    <script src="navigator.js"></script>
</body>

</html>
