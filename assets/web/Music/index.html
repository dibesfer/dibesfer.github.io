<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Music Player</title>
    <link rel="shortcut icon" href="https://upload.wikimedia.org/wikipedia/commons/c/c6/House_Music_Icon_2022.png"
        type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="https://dibesfer.github.io/ferscript.js"></script>
</head>

<body>
    <div id="app">

        <div style="height: 100%; overflow: hidden; display: flex;">
            <img id="playBtn" class="icon" style="display: inline-block;" src="assets/icons/play.svg" alt="play button">
            <img id="stopBtn" class="icon" style="display: inline-block;" src="assets/icons/stop.svg" alt="stop button">
        </div>

        <div id="title">
            <span id="nameDisplay">Song Title</span>
            by <span id="authorDisplay">Author</span>
            ->
            <a id="linkDisplay" href="" target="_blank">link</a>
        </div>

        <img id="skipBtn" class="icon" src="assets/icons/skip.svg" alt="skip button">


    </div>
    <script src="script.js"></script>
</body>

</html>
