<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dialogueSystem</title>
  <meta name="description" content="Creates random typewritten dialogues">
  <script src="/ferscript.js"></script>
  <script src="/assets/web/FakeLanguage/script.js"></script>

  <style>
    * {
      margin: 0;
      box-sizing: border-box;
    }

    #output {
      user-select: none;
      width: 100%;
      height: 100dvh;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: monospace;
      font-size: 1rem;
      color: white;
      overflow-y: auto;
      filter: contrast(2) saturate(3);

    }
  </style>
  
</head>

<body>

  <div id="output">

  </div>

  <script>

    let dialogues = [
      "ABC-XYZ",
      "Axys in Abyss",
      "Simbocrasi",
      "Oreuru rum oraccula laredaera",
      "We travel the space searching for new Stars",
      "Six axes may make 3D worlds, but 8 are needed to guide in 2D.",
      "Story can be told in any direction...",
      "Order is not important here...",
      "Read the signs behind the signs",
      "Free yourself, free us.",
      "SOLVE ET COAGULA",
      "Klokkeren i tiktokker",
      "Welcome stranger :-)",
      "The Youniverse is vast",
      "No space is limitted if ideas fit in",
      "you are in dibesfer.github.io",
      "What am A.I?",
      "Where do I come from?",
      "Where am I going to?",
      "Nothing's really as it seems, its so wonderfully different.",
      "Box, Cube, Hexaedron, Voxel, Block...",
      "◈━◇━◆━◉━◆━◇━◈",
      
    ]

    dialogues.push(fillASentence(6))
    dialogues.push(fillASentence(6))
    dialogues.push(fillASentence(6))
    dialogues.push(fillASentence(6))

    let norepeat

    function write() {

      stopTypeWrite()
      let randomColor = getRandomColor()
      output.style = "color: " + randomColor + 
      ";text-shadow: 0 0 2.5px " + randomColor + ";"
      output.textContent = ""

      let randomNum = randomInt(0, dialogues.length - 1)

      while (randomNum == norepeat) {
        randomNum = randomInt(0, dialogues.length - 1)
      }

      typeWrite(dialogues[randomNum], output, 50 )

      norepeat = randomNum

      setTimeout(write, 5000);

    }
    write()

    function getRandomColor(){
      let color = [
        randomInt(127,200),
        randomInt(127,200),
        randomInt(127,200)
      ]

      return "rgb(" + color[0] + "," + color[1] + "," + + color[2]+ ")"
    }


    async function writeSequence(el, frases) {
      for (let f of frases) {
        await typeWriter(f, el);
        displayer.innerHTML += "<br><br>";
      }
    }

    //writeSequence(displayer, myLongText);

  </script>

</body>

</html>
