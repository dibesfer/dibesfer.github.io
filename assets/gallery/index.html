<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        #galleryFlex {
            display: flex;
            flex-wrap: wrap;
        }

        #galleryFlex>div {
            flex: 33%;
            width: 33%;
            aspect-ratio: 1;
            border: 2px solid;
            background-color: rgba(65, 65, 65, 0.506);
        }

        #galleryFlex>div>img {
            display: block;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <main>
        <div class="maxWidth">
            <h2 class="sectionTitle">Gallery</h2>
            
            <div id="galleryFlex">
                <div><img src="/assets/art/dibesfer/coleccion.jpg" alt=""></div>
                <div><img src="/assets/art/pixelArt/mandala-mastodon.png" alt=""></div>
                <div><img src="/assets/art/minetest/minitest.png" alt=""></div>
                <div><img src="/assets/branding/fergames-logo.png" alt=""></div>
                <div><img src="/assets/gif/sketch2026.gif" alt="dibesfer gif collection of sketches"></div>
                <div><img src="/assets/branding/monochat-logo.png" alt=""></div>
                <div><img src="/assets/art/dibesfer/meeting.jpg" alt=""></div>
                <div><img src="/assets/art/mandalas/unum.png" alt=""></div>

                <div><img src="/assets/art/dibesfer/mandala.jpg" alt=""></div>
            </div>
            <div>
                <img width="100%" src="/games/assets/KL3-HouseExample.gif" alt="">
            </div>

            <br>
            <div class="textCenter">
                <!-- old dibesgallery "../web/dibesgallery/" -->
                
                <h3>See more at <a target="_blank" href="https://docs.google.com/presentation/d/e/2PACX-1vRlLR8CteX035mnsulUu3gYfsLYKPYJ7ngJIwaBa7iVkkeUOOEeBbnp5HdGj_fa4iPgD2_Bi239QSJZ/pub?start=false&loop=false&delayms=3000">The dibesGallery</a></h3>
            </div>
            <br>
            <iframe width="100%" style="height: 6rem;" src="../web/dibesfer_ads/" frameborder="0"></iframe>
            <br>
            <iframe width="100%" src="/assets/components/counter/?url=gallery" frameborder="0"
                style="border:none; height:3rem;"></iframe>



        </div>

    </main>
</body>

</html>
