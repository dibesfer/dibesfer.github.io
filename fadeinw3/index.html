<!DOCTYPE html>
<html>
<head>
<title>W3.CSS</title>
<meta name="viewport" content="width=device-width, initial-scale=1"  user-scalable="no">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">

<style>

  #container {
   background-color: red; 
  }
  
  #container h1 {
   
    font-size: 80px;
    
    
  }
  
  #container p {
   
    font-size: 24px;
    background-color: white;
    
  }
  
</style>
  </head>
<body>

<div id="container" class="w3-content w3-section" style="text-align:center;max-width:500px">
  <!--The w3-animate-opacity class animates an element in and out (takes 0.8 seconds).-->

  <div class="mySlides w3-animate-opacity"><h1>ア</h1><p>a</p></div>
  <div class="mySlides w3-animate-opacity"><h1>イ</h1><p>i</p></div>
    <div class="mySlides w3-animate-opacity"><h1>ウ</h1><p>u</p></div>
    <div class="mySlides w3-animate-opacity"><h1>エ</h1><p>e</p></div>
    <div class="mySlides w3-animate-opacity"><h1>オ</h1><p>o</p></div>
    <div class="mySlides w3-animate-opacity"><h1>ャ</h1><p>ya</p></div>
    <div class="mySlides w3-animate-opacity"><h1>ュ</h1><p>yu</p></div>
      <div class="mySlides w3-animate-opacity"><h1>ョ</h1><p>yo</p></div>
      <div class="mySlides w3-animate-opacity"><h1>カ</h1><p>ka</p></div>
      <div class="mySlides w3-animate-opacity"><h1>キ</h1><p>ki</p></div>
      <div class="mySlides w3-animate-opacity"><h1>ク</h1><p>ku</p></div>
      <div class="mySlides w3-animate-opacity"><h1>ケ</h1><p>ke</p></div>
      <div class="mySlides w3-animate-opacity"><h1>コ</h1><p>ko</p></div>
      <div class="mySlides w3-animate-opacity"><h1>キャ</h1><p>ki + ya / kya</p></div>
        <div class="mySlides w3-animate-opacity"><h1>キュ</h1><p>ki + yu / kyu</p></div>
      <div class="mySlides w3-animate-opacity"><h1>キョ</h1><p>ki + yo / kyo</p></div>

  
</div>

<script>
var myIndex = 0;
carousel();

function carousel() {
  var i;
  var x = document.getElementsByClassName("mySlides");
  for (i = 0; i < x.length; i++) {
    x[i].style.display = "none";  
  }
  myIndex++;
  if (myIndex > x.length) {myIndex = 1}    
  x[myIndex-1].style.display = "block";  
  setTimeout(carousel, 2000);    
}
</script>

</body>
</html>
