<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Threejs</title>
    <link rel="stylesheet" href="style.css">

    <script type="importmap">
    {
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@v0.182.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@v0.182.0/examples/jsm/"
    }
    }
    </script>

</head>

<body>

    <div id="consola">
        <p>FPS: </p>
    </div>

    <div id="miniMap">
        
    </div>
 
    <div id="crossHair">+</div>

    <div id="playerHud">
        <div id="playerHealthBar" aria-label="Player health">
            <div id="playerHealthFill"></div>
            <span id="playerHealthText">100 / 100</span>
        </div>
    </div>

    <div id="menuCentral" class="invisible">
        <h1>Colorlandia</h1>
        <h2>Desktop Controllers</h2>
        <hr>
        <p>Click anywhere to lock your cursor and drive the camera with your mouse.</p>
        <p>Move with WASD</p>
        <p>Jump with Space</p>

        <p>Press Escape to unlock your cursor</p>
        <br>
        <p>game made with Three.js by dibesfer</p>
    </div>

    <div id="menuInferior" class="invisible">

        <div id="menuInferiorLeft">

            <div class="joystick">
                <div class="pad"></div>
            </div>

            <div id="buttonDown" class="button">
                down
            </div>
            <div id="buttonUp" class="button">
                up
            </div>

            <div id="Left0" class="button">
                Left
            </div>
            <div id="Left1" class="button">
                Sprint
            </div>
        </div>

        <div id="menuInferiorRight">

            <div class="joystick">
                <div class="pad"></div>
            </div>

            <div id="buttonShoot" class="button">
                <img src="assets/Mirilla rifle.png" alt="">
            </div>

            <div id="Right1" class="button">R1</div>
            <div id="Right2" class="button">R2</div>
            <div id="Right3" class="button">R3</div>

        </div>

    </div>

    <div id="sceneView"></div>

    <script src="script.js" type="module">

    </script>
</body>

</html>
