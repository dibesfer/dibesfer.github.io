<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Threejs</title>


    <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@v0.182.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@v0.182.0/examples/jsm/"
  }
}
</script>

    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        html,
        body {
            overscroll-behavior: none;
        }

        #menuInferior {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background-color: rgba(82, 82, 82, 0.391);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: space-around;
            align-items: center;
        }

        .joystick {
            border: solid 3px white;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            background-color: gray;
            align-items: center;
        }

        .pad {
            border: solid 3px white;
            background-color: rgb(75, 75, 75);
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .invisible {
            display: none;
        }

        .flex {
            display: flex !important;
        }

        #menuInferiorLeft {
            background-color: rgba(255, 0, 0, 0.25);
            position: relative;
            height: 100%;
            flex: 50%;
        }

        #menuInferiorRight {
            background-color: rgba(0, 128, 0, 0.25);
            position: relative;
            flex: 50%;
            height: 100%;
        }

        #menuInferiorLeft>.joystick ,
        #menuInferiorRight>.joystick {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #buttonDown {
            position: absolute;
            left: 5px;
            bottom: 5px;
            background-color: rgb(75, 75, 75);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        #buttonUp {
            position: absolute;
            right: 5px;
            bottom: 5px;
            background-color: rgb(75, 75, 75);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .button {
            border: solid 3px white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            user-select: none;

        }
    </style>

</head>

<body>

    <div id="menuInferior" class="invisible">

        <div id="menuInferiorLeft">

            <div class="joystick">
                <div class="pad"></div>
            </div>

            <div id="buttonDown" class="button">
                down
            </div>
            <div id="buttonUp" class="button">
                up
            </div>
        </div>

        <div id="menuInferiorRight">

            <div class="joystick">
                <div class="pad"></div>
            </div>

        </div>

    </div>

    <script type="module">

        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let mobileMode = false
        let windowWidth = window.innerWidth

        let windowHeight = window.innerHeight

        // --------------------
        // SCENE
        // --------------------
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.002); // niebla azul cielo

        // --------------------
        // CAMERA
        // --------------------
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            3000
        );
        camera.position.set(0, 3, 10);

        // --------------------
        // RENDERER
        // --------------------

        let menuInferior = document.getElementById("menuInferior")


        function checkForJoysticks() {

            if (windowWidth < 600 && menuInferior.classList.contains("invisible")) {

                console.log("Joysticks Activated")
                menuInferior.classList.remove("invisible")
                menuInferior.classList.add("flex")
                mobileMode = true
                document.removeEventListener('click', controlLocker);


                return true

            }
            else if (windowWidth > 600) {
                console.log("Joysticks Deactivated")
                menuInferior.classList.add("invisible")
                menuInferior.classList.remove("flex")
                mobileMode = false
                document.addEventListener('click', controlLocker);

                return false
            }
        }

        checkForJoysticks()




        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB); // cielo azul
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --------------------
        // CONTROLS
        // --------------------
        const controls = new PointerLockControls(camera, document.body);

        function controlLocker() {


            controls.lock()

        }



        const keys = {};
        document.addEventListener('keydown', e => keys[e.code] = true);
        document.addEventListener('keyup', e => keys[e.code] = false);
        const speed = 0.25;

        // --------------------
        // LIGHTS
        // --------------------
        const hemi = new THREE.HemisphereLight(0xffffff, 0x888888, 1.5);
        scene.add(hemi);

        const dir = new THREE.DirectionalLight(0xffffff, 1);
        dir.position.set(100, 200, 100);
        dir.castShadow = true;
        scene.add(dir);

        // --------------------
        // GROUND
        // --------------------
        const groundGeo = new THREE.PlaneGeometry(1000, 1000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --------------------
        // NAME GENERATOR
        // --------------------
        const nameParts1 = ["Neo", "Cyber", "Quantum", "Nova", "Hyper", "Astra", "Meta"];
        const nameParts2 = ["Corp", "Tower", "Labs", "Systems", "Group", "Industries", "Center"];

        function randomName() {
            return (
                nameParts1[Math.floor(Math.random() * nameParts1.length)] +
                " " +
                nameParts2[Math.floor(Math.random() * nameParts2.length)]
            );
        }

        // --------------------
        // WALL SIGN FUNCTION
        // --------------------
        function createWallSign(text) {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = 512;
            canvas.height = 128;

            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "white";
            ctx.lineWidth = 6;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "white";
            ctx.font = "42px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.MeshBasicMaterial({ map: texture });
            const geometry = new THREE.PlaneGeometry(3, 0.8);

            return new THREE.Mesh(geometry, material);
        }

        // --------------------
        // CITY GENERATION
        // --------------------
        const buildingGeo = new THREE.BoxGeometry(1, 1, 1);
        const spacing = 10; // calles más anchas

        for (let x = -100; x <= 100; x += spacing) {
            for (let z = -100; z <= 100; z += spacing) {

                const height = Math.random() * 25 + 5;

                // color completamente aleatorio
                const buildingMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(Math.random(), Math.random(), Math.random())
                });

                const building = new THREE.Mesh(buildingGeo, buildingMat);
                building.scale.set(6, height, 6);
                building.position.set(x, height / 2, z);
                building.castShadow = true;
                building.receiveShadow = true;
                scene.add(building);

                // --------------------
                // RANDOM FACE SIGN
                // --------------------
                const sign = createWallSign(randomName());

                const halfSize = 3; // building width / 2 (6 / 2)

                const face = Math.floor(Math.random() * 4);

                switch (face) {
                    case 0: // +Z
                        sign.position.set(x, 2, z + halfSize + 0.01);
                        break;
                    case 1: // -Z
                        sign.position.set(x, 2, z - halfSize - 0.01);
                        sign.rotation.y = Math.PI;
                        break;
                    case 2: // +X
                        sign.position.set(x + halfSize + 0.01, 2, z);
                        sign.rotation.y = -Math.PI / 2;
                        break;
                    case 3: // -X
                        sign.position.set(x - halfSize - 0.01, 2, z);
                        sign.rotation.y = Math.PI / 2;
                        break;
                }

                scene.add(sign);
            }
        }

        // --------------------
        // RESIZE
        // --------------------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();


            windowWidth = window.innerWidth

            windowHeight = window.innerHeight

            checkForJoysticks()


            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let leftTouchId = null;
        let rightTouchId = null;

        const leftJoy = document.querySelector("#menuInferiorLeft .joystick");
        const leftPad = leftJoy.querySelector(".pad");

        leftJoy.addEventListener("touchstart", e => {
            for (let t of e.changedTouches) {
                leftTouchId = t.identifier;
            }
        });

        leftJoy.addEventListener("touchend", e => {
            for (let t of e.changedTouches) {
                if (t.identifier === leftTouchId) {
                    leftTouchId = null;
                    moveForward = 0;
                    moveRight = 0;
                    leftPad.style.transform = "translate(0px,0px)";
                }
            }
        });

        leftJoy.addEventListener("touchmove", e => {
            for (let t of e.touches) {
                if (t.identifier === leftTouchId) {

                    const rect = leftJoy.getBoundingClientRect();
                    const x = t.clientX - rect.left - rect.width / 2;
                    const y = t.clientY - rect.top - rect.height / 2;

                    const max = 50;
                    const dx = Math.max(-max, Math.min(max, x));
                    const dy = Math.max(-max, Math.min(max, y));

                    leftPad.style.transform = `translate(${dx}px,${dy}px)`;

                    moveForward = -dy / max;
                    moveRight = dx / max;
                }
            }
        });

        const rightJoy = document.querySelector("#menuInferiorRight .joystick");
        const rightPad = rightJoy.querySelector(".pad");

        rightJoy.addEventListener("touchstart", e => {
            for (let t of e.changedTouches) {
                rightTouchId = t.identifier;
            }
        });

        rightJoy.addEventListener("touchend", e => {
            for (let t of e.changedTouches) {
                if (t.identifier === rightTouchId) {
                    rightTouchId = null;
                    rightPad.style.transform = "translate(0px,0px)";
                }
            }
        });

        rightJoy.addEventListener("touchmove", e => {
            for (let t of e.touches) {
                if (t.identifier === rightTouchId) {

                    const rect = rightJoy.getBoundingClientRect();
                    const x = t.clientX - rect.left - rect.width / 2;
                    const y = t.clientY - rect.top - rect.height / 2;

                    const max = 50;
                    const dx = Math.max(-max, Math.min(max, x));
                    const dy = Math.max(-max, Math.min(max, y));

                    rightPad.style.transform = `translate(${dx}px,${dy}px)`;

                    yaw -= dx * sensitivity;
                    pitch -= dy * sensitivity;
                    pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
                }
            }
        });
        // --------------------
        // MOBILE CONTROL VALUES
        // --------------------
        let moveForward = 0;
        let moveRight = 0;

        let yaw = 0;
        let pitch = 0;

        const sensitivity = 0.002;


        // fly
        let flying = false
        let descending = false
        buttonUp.addEventListener("touchstart", e => {
            flying = true
        });

        buttonUp.addEventListener("touchend", e => {
            flying = false
        });

        buttonDown.addEventListener("touchstart", e => {
            descending = true
        });

        buttonDown.addEventListener("touchend", e => {
            descending = false
        });

        // --------------------
        // ANIMATION LOOP
        // --------------------
        renderer.setAnimationLoop(() => {

            if (controls.isLocked) {

                if (keys['KeyW']) controls.moveForward(speed);
                if (keys['KeyS']) controls.moveForward(-speed);
                if (keys['KeyA']) controls.moveRight(-speed);
                if (keys['KeyD']) controls.moveRight(speed);

                if (keys['Space']) camera.position.y += speed;
                if (keys['ShiftLeft'] || keys['ShiftRight']) camera.position.y -= speed;


            }


            if (mobileMode) {
                console.log("mobile mode true")

                // Apply rotation
                camera.rotation.order = "YXZ";
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;

                // Apply movement relative to rotation
                const forward = new THREE.Vector3();
                camera.getWorldDirection(forward);
                forward.y = 0;
                forward.normalize();

                const right = new THREE.Vector3();
                right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

                camera.position.addScaledVector(forward, moveForward * speed);
                camera.position.addScaledVector(right, moveRight * speed);

                if (flying) camera.position.y += speed;
                if (descending) camera.position.y -= speed;
            }

            renderer.render(scene, camera);
        });
    </script>
</body>

</html>
