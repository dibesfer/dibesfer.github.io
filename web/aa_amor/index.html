    <!-- 6. ADD LOAD SCRIPT -->
    <script>

        async function load(id, file) {
            fetch(file)
                .then(r => r.text())
                .then(html => gettag(id).innerHTML = html)
                .then(() => {

                    fetch("components/footer.html")
                        .then(a => a.text())
                        .then(html => gettag("footer").innerHTML = html)
                        .then(() => {
                            app()
                        })
                });
        }

        load("header", "components/header-main.html");

    </script>
