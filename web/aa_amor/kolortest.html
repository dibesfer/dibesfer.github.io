<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dbf - kolortest</title>

    <!-- 1. TAKE THE STYLES -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/ferstyle.css">

    <!-- 2. TAKE THE FERSCRIPT -->
    <script src="/ferscript.js"></script>
    <!-- 3. SUPABASE cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>

        iframe {
            width: 100%;
            height: 800px;
            background-color: white;
        }

    </style>

</head>

<body>

    <!-- 4. ADD AN EMPTY HEADER -->
    <header></header>

    <!-- 4.1. INSERT YOUR CONTENT IN <main> -->
    <main>
        <iframe src="/web/Kolorlando/index.html" frameborder="0"></iframe>
    </main>

    <!-- 5. ADD AN EMPTY FOOTER -->
    <footer></footer>

    <!-- 6. ADD SCRIPT.JS -->
    <script src="script.js"></script>
    <script src="/assets/scripts/supabase.js"></script>
    <!-- 7. ADD LOAD SCRIPT -->
    <script>

        async function load(id, file) {
            fetch(file)
                .then(r => r.text())
                .then(html => gettag(id).innerHTML = html)
                .then(() => {

                    fetch("components/footer.html")
                        .then(a => a.text())
                        .then(html => gettag("footer").innerHTML = html)
                        .then(() => {
                            app()
                        })
                });
        }

        load("header", "components/header.html");

    </script>
</body>

</html>
