<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dbf - SFC</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Square Face Creator</h1>
        <h3 class="combinations-title"></h3>
    </header>
    <main>
        <div class="canvas-wrapper">
            <canvas></canvas>
            <input class="canvas-background-picker" type="color" value="#d4af37" aria-label="Canvas background color">
            <input class="canvas-secondary-picker" type="color" value="#d4af37" aria-label="Secondary color">
        </div>
        <div class="categoryPicker">
            <div class="category-wrapper">
                <div class="category" data-category="eyes">
                    Eyes
                </div>
                <div class="category" data-category="eyebrows">
                    Eyebrows
                </div>
                <div class="category" data-category="nose">
                    Nose
                </div>
                <div class="category" data-category="mouth">
                    Mouth
                </div>
                <div class="category" data-category="ears">
                    Ears
                </div>
                <div class="category" data-category="hair">
                    Hair
                </div>
            </div>
        </div>
        <div class="faceItemGrid">

            <div class="faceItem">
                <img src="https://t4.ftcdn.net/jpg/05/15/85/45/360_F_515854547_vG0mwDLMAtxwvjTME7kkbGu0rX5Fp0d3.jpg"
                    alt="">
            </div>
            <div class="faceItem">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/038/557/145/small/anime-girl-s-eyes-in-a-manga-comic-book-frame-fancy-illustration-in-cartoon-style-vector.jpg"
                    alt="">
            </div>
            <div class="faceItem">
                <img src="https://www.shutterstock.com/image-vector/crying-eyes-anime-manga-girls-260nw-783306307.jpg"
                    alt="">
            </div>
            <div class="faceItem">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYsDuHNL4TPq7wN195KM2cjMrmXimbgY8mMA&s"
                    alt="">
            </div>
            <div class="faceItem"></div>
            <div class="faceItem"></div>
            <div class="faceItem"></div>
            <div class="faceItem"></div>
            <div class="faceItem"></div>
            <div class="faceItem"></div>
            <div class="faceItem"></div>
            <div class="faceItem"></div>
            <div class="faceItem"></div>
            <div class="faceItem"></div>
            <div class="faceItem"></div>
            <div class="faceItem"></div>

        </div>
    </main>
    <footer>
        <p>made by dibesfer</p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
