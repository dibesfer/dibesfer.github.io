<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GLB Texture Cycle</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #111;
}
canvas { width: 100%; height: 100%; display: block; }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>

<body>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

const MODEL_SRC = "assets/Cuban/Cuban.glb";

// scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

// camera
const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 1000);

// renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// light
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(3, 5, 4);
scene.add(light);

// TRUE pivot (origin of universe)
const pivot = new THREE.Group();
scene.add(pivot);

const clock = new THREE.Clock();

let model = null;
let material = null;

let texIndex = 0;
let nextSwap = 0;

// textures
const texLoader = new THREE.TextureLoader();

function loadTex(path){
  const t = texLoader.load(path);
  t.colorSpace = THREE.SRGBColorSpace;
  t.generateMipmaps = false;
  t.minFilter = THREE.NearestFilter;
  t.magFilter = THREE.NearestFilter;
  t.flipY = false;
  return t;
}

const textures = [
  loadTex("assets/Cuban/cuban_texture.png"),
  loadTex("assets/Cuban/cuban_texture2.png"),
  loadTex("assets/Cuban/cuban_texture3.png")
];

// LOAD
const loader = new GLTFLoader();

loader.load(MODEL_SRC, (gltf) => {

  model = gltf.scene;

  // 🔥 STEP 0: neutralize GLTF root transforms (IMPORTANT)
  model.updateMatrixWorld(true);
  model.position.set(0, 0, 0);
  model.rotation.set(0, 0, 0);
  model.scale.set(1, 1, 1);

  // 🔥 STEP 1: compute clean bounding box AFTER reset
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());

  // 🔥 STEP 2: shift model so geometry center sits at origin
  model.position.sub(center);

  // 🔥 STEP 3: attach to pivot (true rotation parent)
  pivot.add(model);

  // 🔥 STEP 4: lock material
  model.traverse((o) => {
    if (o.isMesh && !material) material = o.material;
  });

  // 🔥 STEP 5: camera framing based on clean size
  const maxDim = Math.max(size.x, size.y, size.z);
  camera.position.set(0, 0, maxDim * 2.2);
  camera.lookAt(0, 0, 0);
});

// swap
function swapTexture(){
  if(!material) return;

  texIndex = (texIndex + 1) % textures.length;
  material.map = textures[texIndex];
  material.needsUpdate = true;
}

// loop
function animate(){

  const t = clock.getElapsedTime();

  if(model){
      pivot.rotation.x += 0.005;
  pivot.rotation.y += 0.01;
  pivot.rotation.z += 0.003;
  }

  if(t > nextSwap){
    swapTexture();
    nextSwap = t + (5 + Math.random()*5);
  }

  renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);

// resize
window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
