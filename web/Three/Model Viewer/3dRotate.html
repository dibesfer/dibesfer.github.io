<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GLB Texture Cycle</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #111;
}
canvas { width: 100%; height: 100%; display: block; }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>

<body>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

const MODEL_SRC = "assets/Cuban/Cuban.glb";

let CAMERA_OFFSET = 3;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(3, 5, 4);
scene.add(light);

const pivot = new THREE.Group();
scene.add(pivot);

const clock = new THREE.Clock();

let model = null;
let material = null;

/* TEXTURES */
const texLoader = new THREE.TextureLoader();

function loadTex(path){
  const t = texLoader.load(path);
  t.colorSpace = THREE.SRGBColorSpace;
  t.generateMipmaps = false;
  t.minFilter = THREE.NearestFilter;
  t.magFilter = THREE.NearestFilter;
  t.flipY = false;
  return t;
}

const textures = [
  loadTex("assets/Cuban/cuban_texture.png"),
  loadTex("assets/Cuban/cuban_texture2.png"),
  loadTex("assets/Cuban/cuban_texture3.png")
];

let texIndex = Math.floor(Math.random() * textures.length);
let nextSwap = 5 + Math.random() * 5;

/* CAMERA FIT */
function fitCamera(object) {

  const box = new THREE.Box3().setFromObject(object);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  const maxSize = Math.max(size.x, size.y, size.z);

  const fov = camera.fov * Math.PI / 180;
  let cameraZ = Math.abs(maxSize / 2 / Math.tan(fov / 2));

  cameraZ *= CAMERA_OFFSET;

  camera.position.set(center.x, center.y, cameraZ);
  camera.lookAt(center);

  camera.updateProjectionMatrix();
}

/* RESIZE + LOAD SYNC */
function applyLayout() {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();

  if (model) fitCamera(model);
}

/* GLTF LOAD */
const loader = new GLTFLoader();

loader.load(MODEL_SRC, (gltf) => {

  model = gltf.scene;

  model.updateMatrixWorld(true);
  model.position.set(0, 0, 0);
  model.rotation.set(0, 0, 0);
  model.scale.set(1, 1, 1);

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());

  model.position.sub(center);

  pivot.add(model);

  model.traverse((o) => {
    if (o.isMesh && !material) material = o.material;
  });

  material.map = textures[texIndex];
  material.needsUpdate = true;

  requestAnimationFrame(applyLayout);
});

/* TEXTURE SWAP */
function swapTexture(){
  if(!material) return;

  texIndex = (texIndex + 1) % textures.length;
  material.map = textures[texIndex];
  material.needsUpdate = true;
}

/* 🧠 NEW MOTION SYSTEM */
let rotSpeed = new THREE.Vector3(
  0.003,
  0.01,
  0.002
);

let rotTarget = new THREE.Vector3(
  0.005,
  0.012,
  0.004
);

/* LOOP */
function animate(){

  const t = clock.getElapsedTime();

  if(model){

    // smooth acceleration / deceleration
    rotSpeed.lerp(rotTarget, 0.02);

    // apply motion
    pivot.rotation.x += rotSpeed.x;
    pivot.rotation.y += rotSpeed.y;
    pivot.rotation.z += rotSpeed.z;

    // random drift updates
    if(Math.random() < 0.01){
      rotTarget.set(
        (Math.random() - 0.5) * 0.01,
        (Math.random() - 0.5) * 0.02,
        (Math.random() - 0.5) * 0.01
      );
    }
  }

  if(t > nextSwap){
    swapTexture();
    nextSwap = t + (5 + Math.random() * 5);
  }

  renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);

/* RESIZE */
window.addEventListener("resize", applyLayout);

</script>
</body>
</html>
