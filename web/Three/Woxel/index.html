<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woxel</title>
    <link rel="stylesheet" href="./style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.177.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.177.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="app">
        <canvas id="sceneView" aria-label="Woxel scene"></canvas>

        <div id="hud" class="panel">
            <h1>Woxel</h1>
            <p>The Voxel World walking simulator</p>
            <div id="statusLine">Booting...</div>
        </div>

        <div id="overlay" class="panel">
            <h2>Enter Woxel</h2>
            <p>Walk a <code>.world</code> in first person.</p>
            <div class="actions">
                <button id="toggleLoadOptionsButton" type="button">Load World</button>
                <button id="playButton" type="button">Play Demo World</button>
            </div>
            <div id="importPanel" hidden>
                <div id="loadModeTabs" role="tablist" aria-label="World source">
                    <button class="load-mode-tab is-active" data-load-mode="file" type="button">FILE</button>
                    <button class="load-mode-tab" data-load-mode="text" type="button">TEXT</button>
                    <button class="load-mode-tab" data-load-mode="url" type="button">URL</button>
                </div>

                <form id="worldForm">
                    <div class="load-mode-panel" data-load-panel="file">
                        <label for="worldFileInput">World File</label>
                        <input id="worldFileInput" type="file" accept=".world,application/json">
                    </div>

                    <div class="load-mode-panel" data-load-panel="text" hidden>
                        <label for="worldTextInput">World Text</label>
                        <textarea id="worldTextInput" placeholder='{"name":"My World","size":{"x":16,"y":8,"z":16},"spawnPosition":{"x":8,"y":2,"z":8},"voxels":[]}'></textarea>
                    </div>

                    <div class="load-mode-panel" data-load-panel="url" hidden>
                        <label for="worldUrlInput">World URL</label>
                        <input id="worldUrlInput" type="url" placeholder="https://example.com/my-world.world">
                    </div>

                    <div class="actions">
                        <button id="proceedLoadButton" type="submit">Proceed</button>
                    </div>
                </form>
            </div>
            <div id="overlayHint">
                <p><code>WASD</code> move</p>
                <p><code>Mouse</code> look</p>
                <p><code>Space</code> jump</p>
                <p><code>Esc</code> unlock cursor</p>
            </div>
        </div>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
