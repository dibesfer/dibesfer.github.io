<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoxelBinarier</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 2rem;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.4;
      color: #111;
      background: #aaa;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0 0 1rem;
      font-weight: normal;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 1rem 0;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
    }

    textarea {
      width: 100%;
      height: 55vh;
      resize: vertical;
      padding: 1rem;
      border: 1px solid #111;
      background: #ddd;
      color: #111;
      font: inherit;
      white-space: pre;
    }

    textarea:focus {
      outline: 2px solid #111;
    }

    button,
    input[type="file"] {
      font: inherit;
    }

    button {
      padding: 0.4rem 0.8rem;
      border: 1px solid #111;
      background: #ddd;
      cursor: pointer;
    }

    button:hover {
      background: #eee;
    }

    .bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin: 1rem 0;
    }

    .console {
      padding: 0.5rem;
      border: 1px solid #111;
      background: #ccc;
    }

    small {
      display: block;
      margin-top: 0.5rem;
    }

    a {
      color: #111;
    }

    @media (max-width: 800px) {
      body {
        margin: 1rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      textarea {
        height: 40vh;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>VoxelBinarier</h1>
    <h3>.voxel JSON ⇄ .voxel Binary Base64</h3>

    <div class="bar">
      <button type="button" id="convertButton">Convert</button>
      <button type="button" id="clearButton">Clear</button>
      <button type="button" id="downloadJsonButton">Download JSON</button>
      <button type="button" id="downloadBinaryButton">Download Binary</button>
      <input type="file" id="fileInput" accept=".voxel,.json,.txt,application/json,application/octet-stream">
    </div>

    <p class="console">
      Consola:
      <span id="consola">Waiting input</span>
    </p>

    <section class="grid">
      <div>
        <label for="voxelJSONInput">JSON</label>
        <textarea id="voxelJSONInput" spellcheck="false" placeholder="{ ... }"></textarea>
        <small id="jsonInfo">0 chars</small>
      </div>

      <div>
        <label for="voxelBinaryInput">Binary Base64</label>
        <textarea id="voxelBinaryInput" spellcheck="false" placeholder="S0wyV..."></textarea>
        <small id="binaryInfo">0 chars</small>
      </div>
    </section>

    <hr>

    <p>by <a href="https://dibesfer.github.io">dibesfer</a></p>
  </main>

  <script type="module">
    import VoxelDataCompression from "./VoxelDataCompression.js";

    const jsonInput = document.querySelector("#voxelJSONInput");
    const binaryInput = document.querySelector("#voxelBinaryInput");
    const consola = document.querySelector("#consola");
    const jsonInfo = document.querySelector("#jsonInfo");
    const binaryInfo = document.querySelector("#binaryInfo");

    const convertButton = document.querySelector("#convertButton");
    const clearButton = document.querySelector("#clearButton");
    const downloadJsonButton = document.querySelector("#downloadJsonButton");
    const downloadBinaryButton = document.querySelector("#downloadBinaryButton");
    const fileInput = document.querySelector("#fileInput");

    let lastInput = "json";

    jsonInput.addEventListener("input", () => {
      lastInput = "json";
      updateInfo();
    });

    binaryInput.addEventListener("input", () => {
      lastInput = "binary";
      updateInfo();
    });

    convertButton.addEventListener("click", convert);
    clearButton.addEventListener("click", clear);
    downloadJsonButton.addEventListener("click", downloadJson);
    downloadBinaryButton.addEventListener("click", downloadBinary);
    fileInput.addEventListener("change", loadFile);

    function convert() {
      try {
        if (lastInput === "json") {
          jsonToBinary();
          return;
        }

        binaryToJson();
      } catch (error) {
        fail(error);
      }
    }

    function jsonToBinary() {
      const jsonText = jsonInput.value.trim();

      if (!jsonText) {
        setConsole("JSON empty.");
        return;
      }

      const bytes = VoxelDataCompression.encode_json_text(jsonText);
      const base64 = VoxelDataCompression.to_base64(bytes);
      const report = VoxelDataCompression.report(jsonText);

      binaryInput.value = base64;

      setConsole(
        `JSON → Binary | ${report.jsonBytes} bytes → ${report.binaryBytes} bytes | saved ${report.savedBytes} bytes`
      );

      updateInfo();
    }

    function binaryToJson() {
      const binaryText = binaryInput.value.trim();

      if (!binaryText) {
        setConsole("Binary empty.");
        return;
      }

      const bytes = VoxelDataCompression.from_base64(binaryText);

      jsonInput.value = VoxelDataCompression.decode_json_text(bytes, 2);

      setConsole(`Binary → JSON | ${bytes.length} binary bytes`);
      updateInfo();
    }

    async function loadFile(event) {
      const file = event.target.files?.[0];

      if (!file) return;

      try {
        const buffer = await file.arrayBuffer();
        const bytes = new Uint8Array(buffer);
        const text = await file.text();

        if (VoxelDataCompression.is_binary(bytes)) {
          binaryInput.value = VoxelDataCompression.to_base64(bytes);
          jsonInput.value = VoxelDataCompression.decode_json_text(bytes, 2);
          lastInput = "binary";
          setConsole(`Loaded binary file: ${file.name}`);
        } else {
          jsonInput.value = text;
          jsonToBinary();
          lastInput = "json";
          setConsole(`Loaded JSON file: ${file.name}`);
        }

        updateInfo();
      } catch (error) {
        fail(error);
      } finally {
        fileInput.value = "";
      }
    }

    function downloadJson() {
      const text = jsonInput.value.trim();

      if (!text) {
        setConsole("JSON empty.");
        return;
      }

      downloadText(fileName(), text, "application/json");
    }

    function downloadBinary() {
      try {
        const text = binaryInput.value.trim();

        if (!text) {
          setConsole("Binary empty.");
          return;
        }

        const bytes = VoxelDataCompression.from_base64(text);

        downloadBytes(fileName(), bytes, "application/octet-stream");
      } catch (error) {
        fail(error);
      }
    }

    function fileName() {
      try {
        const data = JSON.parse(jsonInput.value || "{}");

        return `${safeName(data.name || "voxel")}.voxel`;
      } catch {
        return "voxel.voxel";
      }
    }

    function safeName(name = "voxel") {
      return String(name)
        .trim()
        .replace(/[^a-z0-9-_]+/gi, "-")
        .replace(/^-|-$/g, "")
        || "voxel";
    }

    function downloadText(name, text, type) {
      downloadBlob(name, new Blob([text], { type }));
    }

    function downloadBytes(name, bytes, type) {
      downloadBlob(name, new Blob([bytes], { type }));
    }

    function downloadBlob(name, blob) {
      const link = document.createElement("a");

      link.href = URL.createObjectURL(blob);
      link.download = name;
      link.click();

      window.setTimeout(() => URL.revokeObjectURL(link.href), 0);
    }

    function clear() {
      jsonInput.value = "";
      binaryInput.value = "";
      lastInput = "json";
      setConsole("Cleared.");
      updateInfo();
    }

    function updateInfo() {
      jsonInfo.textContent = `${jsonInput.value.length} chars`;
      binaryInfo.textContent = `${binaryInput.value.length} chars`;
    }

    function setConsole(message) {
      consola.textContent = message;
    }

    function fail(error) {
      console.error(error);
      setConsole(error?.message || "Error.");
    }

    updateInfo();
  </script>
</body>
</html>
