<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VoxelEditor</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="assets/brand/vvicon.png" type="image/x-icon">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.183.2/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.183.2/examples/jsm/"
    }
  }
  </script>
</head>

<body>

  <div id="consola">
    <div id="supertitle"><span class="only-mobile">VV</span><span class="only-desktop">VoxelEditor</span></div>
    <div id="fpsCounter">FPS:</div>
    <div>
      Name:
      <input id="UIVoxelName" style="width: 120px;font: unset;border: solid 3px;" type="text" name="" placeholder="Table">
    </div>
    <div id="loadButton">⬇️<span class="only-desktop">Load</span></div>
    <div id="saveButton">💾<span class="only-desktop">Save</span></div>
   
    <div style="background-color: lightblue;">👤<span class="only-desktop">Log in</span></div>
   
  </div>

  <div id="menu" class="invisible">
    <h2>test</h2>
  
  </div>

  <div id="options">
    <div class="optionstitle">⚙️<span class="only-desktop">Options</span></div>
    <div>
      🌈<span class="only-desktop">Color</span>
      <input type="color" name="" id="editorColorInput" value="#ffffff">
      
    </div>
    <div id="paintToolButton">🖌️<span class="only-desktop">Paint</span></div>

    <div id="placeToolButton">👇<span class="only-desktop">Place</span></div>
    
    <div id="eraserToolButton" class="option_selected">✖️<span class="only-desktop">Eraser</span></div>
    <div id="lineModeButton" class="secondary_option">↗️<span class="only-desktop">Line</span></div>
    <div>🔝<span class="only-desktop">Extrude</span></div>
    <div id="boxModeButton" class="secondary_option">📦<span class="only-desktop">Box Select</span></div>
    <div>
      🪞<span class="only-desktop">Mirror</span>
      <input type="checkbox" name="mirror-x" id="mirrorXInput" autocomplete="off">X
      <input type="checkbox" name="mirror-y" id="mirrorYInput" autocomplete="off">Y
      <input type="checkbox" name="mirror-z" id="mirrorZInput" autocomplete="off">Z

    </div>
    <div class="orientation-controls">
      🧭<span class="only-desktop">Orient</span>
      <label for="orientXInput">X</label>
      <input type="number" name="orient-x" id="orientXInput" min="0" max="270" step="90" value="0" autocomplete="off">
      <label for="orientYInput">Y</label>
      <input type="number" name="orient-y" id="orientYInput" min="0" max="270" step="90" value="0" autocomplete="off">
      <label for="orientZInput">Z</label>
      <input type="number" name="orient-z" id="orientZInput" min="0" max="270" step="90" value="0" autocomplete="off">
    </div>
  </div>

  <!-- UI -->
  <script src="script.js"></script>

  <!-- Threejs -->
   <script src="three.js" type="module"></script>
</body>

</html>
