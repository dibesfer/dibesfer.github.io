<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dibesfer ads</title>
    <link rel="stylesheet" href="/dibesferV3/style.css">
    <style>

        * {
            margin: 0;
            box-sizing: border-box;
        }
        
        .ad {
            width: 100%;
            height: 6rem;
            border: solid 3px white;
            line-height: 1.5;
            overflow: hidden;
            padding: 5px;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .flexo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .flexo2 {
            flex: 1;
            width: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .adTxt {
            overflow: auto;
            white-space: nowrap;
            height: 2.5rem;
            min-width: 0;

            mask-image: linear-gradient(to right, white 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, white 80%, transparent 100%);

        }
        .adTxt:after {
            content: "⠀⠀";
        }

        .adImg {
            height: 3rem;
            aspect-ratio: 16/9;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <div class="ad">
        <div style="display: flex; justify-content: space-between;">
            <div>Ad</div>
            <div style="color: gray;font-size: 0.75rem;">Advertise <a href="">here</a></div>
        </div>
        <div class="flexo">
            <img class="adImg"
                src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Integrated_circuit_on_microchip.jpg"
                alt="microchip">
            <div class="flexo2">
                <div class="adTitle"><a href="" target="_blank">NVIDIA</a></div>
                <div class="adTxt">Buy microchips now <a href="" target="_blank">here</a> and Lorem ipsum
                    dolor sit amet
                    consectetur
                    adipisicing elit. Itaque quas nihil doloremque laborum eaque nam a corporis corrupti,
                    sint
                    ipsa,
                    totam ad necessitatibus odio dignissimos. Illo molestias eveniet culpa cupiditate?</div>
            </div>
        </div>
    </div>

    <script>

        let myAd = document.querySelector(".ad")
        let myAdImg = document.querySelector(".adImg")
        let myAdTxt = document.querySelector(".adTxt")
        let myAdTitle = document.querySelector(".adTitle")
        console.log(myAdTitle)

        let ads = [
            {
                adTitle: "Debian",
                adImg: "https://www.debian.org/Pics/debian-logo-1024x576.png",
                adTxt: `El sistema operativo universal. The universal operating system. Visit <a href="https://www.debian.org/" target="_blank">here</a> Debian is a complete Free Operating System!`,
            },
            {
                adTitle: "<a href='https://fedoraproject.org' target='_blank'>Fedora</a>",
                adImg: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Fedora_logo.svg/960px-Fedora_logo.svg.png",
                adTxt: `Fedora es una de las distribuciones de Linux más populares y avanzadas`,
            }
        ]

        myAdTitle.innerHTML = ads[1].adTitle
        myAdImg.src = ads[1].adImg
        myAdTxt.innerHTML = ads[1].adTxt
        

    </script>
</body>

</html>
