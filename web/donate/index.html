  <script>

    async function load(id, file) {
      fetch(file)
        .then(r => r.text())
        .then(html => gettag(id).innerHTML = html)
        .then(() => {

          fetch("/web/aa_amor/components/leftMenu.html")
            .then(a => a.text())
            .then(html => {
              gettag(id).innerHTML += html

              fetch("/web/aa_amor/components/rightMenu.html")
                .then(a => a.text())
                .then(html => {
                  gettag(id).innerHTML += html


                  fetch("/web/aa_amor/components/footer.html")
                    .then(a => a.text())
                    .then(html => {
                      gettag("footer").innerHTML = html
                    }).then(() => {
                      app()
                    })
                })
            })

        });
    }

    load("header", "/web/aa_amor/components/header.html");
