<body>
  <header></header>

  <main>

    <!-- <button onclick="changeIframeSrc()">Press</button> -->

  <footer></footer>
  <script>

    let myURL = window.location.href
    let myLink = myURL.split("#")[1]

    function changeSrcdoc(stringURL) {


      fetch(stringURL)
        .then(function (response) {
          // When the page is loaded convert it to text
          console.log(response)
          console.log(myLink)
          return response.text()

        })
        .then(function (html) {
          myIframe.src = myLink;
adjustHeight()

        })
        .catch(function (err) {
          console.log('Failed to fetch page: ', err);
        });
    }
    if (myLink != null)
      changeSrcdoc(myLink)


    function changeIframeSrc() {
      //myIframe.src='/assets/books/primaryChat.txt'
      //myIframe.srcdoc = "<style>body {color: white}</style><h1>Hello world</h1>"
      changeSrcdoc()
      

    }

    function adjustHeight(){
      myIframe.onload = () => {
      myIframe.style.height =
        myIframe.contentWindow.document.body.scrollHeight + "px";
    };
    }
  </script>

  <script src="/web/aa_amor/script.js"></script>
  <script src="/assets/scripts/supabase.js"></script>
  <!-- 6. ADD LOAD SCRIPT -->
  <script>

    async function load(id, file) {
      fetch(file)
        .then(r => r.text())
        .then(html => gettag(id).innerHTML = html)
        .then(() => {

          fetch("/web/aa_amor/components/leftMenu.html")
            .then(a => a.text())
            .then(html => {
              gettag(id).innerHTML += html

              fetch("/web/aa_amor/components/rightMenu.html")
                .then(a => a.text())
                .then(html => {
                  gettag(id).innerHTML += html


                  fetch("/web/aa_amor/components/footer.html")
                    .then(a => a.text())
                    .then(html => {
                      gettag("footer").innerHTML = html
                    }).then(() => {
                      app()
                    })
                })
            })

        });
    }

    load("header", "/web/aa_amor/components/header.html");

  </script>
