<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VoxelViewer</title>
  <link rel="stylesheet" href="style.css">

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>

  <div id="consola">
    <div id="supertitle">VoxelViewer</div>
    <div id="fpsCounter">FPS: 0</div>
    <div>
      Name:
      <input id="UIVoxelName" style="width: 120px;font: unset;border: solid 3px;" type="text" name="" placeholder="Table">
    </div>
    <div id="loadButton">Load</div>
    <div id="saveButton">Save</div>
    <div style="background-color: lightblue;">Log in</div>
  </div>

  <div id="menu" class="invisible">
    <h2>test</h2>
  
  </div>

  <div id="options">
    <div class="barTitle">Options</div>
    <div>
      Color
      <input type="color" name="" id="">
      Picker
    </div>
    <div>Brush</div>

    <div class="option_selected">Eraser</div>
    <div>Line</div>
    <div>Extrude</div>
    <div>Box Select</div>
    <div>
      Mirror
      <input type="checkbox" name="" id="">X
      <input type="checkbox" name="" id="">Y
      <input type="checkbox" name="" id="">Z

    </div>
  </div>

  <script>
    // UI
    const menu = document.getElementById("menu");
    const supertitle = document.getElementById("supertitle");
    const loadButton = document.getElementById("loadButton");
    const saveButton = document.getElementById("saveButton");
    const menuState = {
      active: false,
      panel: null,
      cache: {}
    };

    async function fetchMenuContent(panel) {
      if (menuState.cache[panel]) {
        return menuState.cache[panel];
      }

      const response = await fetch(`./UI/${panel}.html`);

      if (!response.ok) {
        throw new Error(`Menu "${panel}" could not be loaded.`);
      }

      const html = await response.text();
      menuState.cache[panel] = html;
      return html;
    }

    async function openMenu(panel) {
      menu.innerHTML = "<p>Loading...</p>";
      menu.classList.remove("invisible");
      menuState.active = true;
      menuState.panel = panel;
      document.addEventListener("click", clickDetect);

      try {
        const html = await fetchMenuContent(panel);

        // Keep the active panel explicit for menu-specific logic later.
        menu.dataset.panel = panel;
        menu.innerHTML = html;
        hydrateMenu(panel);
      } catch (error) {
        menu.innerHTML = `<p>${error.message}</p>`;
      }
    }

    function hydrateMenu(panel) {
      if (panel === "save") {
        const output = menu.querySelector("#saveJsonOutput");
        const saveData = window.getVoxelSaveData?.();

        if (!output || !saveData) return;

        output.value = JSON.stringify(saveData, null, 2);
        return;
      }

      if (panel === "load") {
        const input = menu.querySelector("#loadJsonInput");
        const button = menu.querySelector("#loadJsonButton");
        const status = menu.querySelector("#loadStatus");
        const templateInputs = menu.querySelectorAll('input[name="loadTemplate"]');

        if (!input || !button || !status) return;

        button.addEventListener("click", () => {
          const selectedTemplate = Array.from(templateInputs).find((radio) => radio.checked)?.value;
          const result = input.value.trim()
            ? window.applyVoxelSaveData?.(input.value)
            : window.applyVoxelPreset?.(selectedTemplate);

          status.textContent = result?.message || "Load failed.";
        });
      }
    }

    function closeMenu() {
      menu.classList.add("invisible");
      menuState.active = false;
      menuState.panel = null;
      delete menu.dataset.panel;
      document.removeEventListener("click", clickDetect);
    }

    async function toggleMenu(panel) {
      if (menuState.active && menuState.panel === panel) {
        closeMenu();
        return;
      }

      await openMenu(panel);
    }

    function clickDetect(e) {
      if (
        e.target.closest("#supertitle") ||
        e.target.closest("#loadButton") ||
        e.target.closest("#saveButton")
      ) {
        return;
      }

      if (menuState.active && !e.target.closest("#menu")) {
        closeMenu();
      }
    }

    supertitle.addEventListener("click", () => toggleMenu("about"));
    loadButton.addEventListener("click", () => toggleMenu("load"));
    saveButton.addEventListener("click", () => toggleMenu("save"));
  </script>

  <script type="module">

    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';




    // =========================
    // CLASSES
    // =========================

    class Microxel {
      constructor(color = "#ffffff") {
        this.color = color;
        this.active = true;
      }

      destroy() {
        this.active = false;
      }
    }

    const voxelPresets = {
      empty_preset(size) {
        return {
          size,
          microxels: Array.from({ length: size }, () =>
            Array.from({ length: size }, () =>
              Array.from({ length: size }, () => ({
                color: "#ffffff",
                active: false
              }))
            )
          )
        };
      },

      full_preset(size) {
        return {
          size,
          microxels: Array.from({ length: size }, () =>
            Array.from({ length: size }, () =>
              Array.from({ length: size }, () => ({
                color: "#ffffff",
                active: true
              }))
            )
          )
        };
      },

      random_preset(size) {
        return {
          size,
          microxels: Array.from({ length: size }, () =>
            Array.from({ length: size }, () =>
              Array.from({ length: size }, () => ({
                color: "#ffffff",
                active: Math.random() >= 0.5
              }))
            )
          )
        };
      }
    };

    /*
    okay, so we are generating a Voxel object during this process right?

next step will be formatting into JSON 
    */
    class Voxel {
      constructor(size = 7) {
        this.size = size;
        this.name = "";
        this.microxels = Array.from({ length: size }, () =>
          Array.from({ length: size }, () =>
            Array.from({ length: size }, () => new Microxel())
          )
        );

        this.applyPreset("full");
      }

      get(x, y, z) {
        return this.microxels[x]?.[y]?.[z];
      }

      setName(name = "") {
        this.name = String(name).trim();
      }

      toJSON() {
        return {
          name: this.name,
          size: this.size,
          microxels: this.microxels.map((plane) =>
            plane.map((row) =>
              row.map((cell) => ({
                color: cell.color,
                active: cell.active
              }))
            )
          )
        };
      }

      loadFromData(data) {
        if (!data || data.size !== this.size || !Array.isArray(data.microxels)) {
          throw new Error("Loaded voxel size does not match the current editor.");
        }

        this.setName(data.name ?? "");

        for (let x = 0; x < this.size; x++) {
          for (let y = 0; y < this.size; y++) {
            for (let z = 0; z < this.size; z++) {
              const nextCell = data.microxels?.[x]?.[y]?.[z];

              if (!nextCell) {
                throw new Error(`Missing microxel at ${x},${y},${z}.`);
              }

              const cell = this.get(x, y, z);
              cell.color = typeof nextCell.color === "string" ? nextCell.color : cell.color;
              cell.active = Boolean(nextCell.active);
            }
          }
        }
      }

      applyPreset(presetName) {
        const presetBuilder = voxelPresets[`${presetName}_preset`];

        if (!presetBuilder) {
          throw new Error(`Unknown preset "${presetName}".`);
        }

        this.loadFromData(presetBuilder(this.size));
      }
    }

    // =========================
    // WORLD
    // =========================

    const SIZE = 15;
    const voxel = new Voxel(SIZE);
    const fpsCounter = document.getElementById("fpsCounter");
    const uiVoxelName = document.getElementById("UIVoxelName");
    window.getVoxelSaveData = () => voxel.toJSON();

    function syncVoxelNameInput() {
      uiVoxelName.value = voxel.name;
    }

    uiVoxelName.addEventListener("input", (e) => {
      voxel.setName(e.target.value);
    });

    syncVoxelNameInput();

    console.log("🔥 INITIAL VOXEL:", voxel);

    // =========================
    // THREE SETUP
    // =========================

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(20, 20, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);

    // =========================
    // LIGHTS (FIXED SYNTAX)
    // =========================

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight.position.set(15, 25, 10);
    scene.add(dirLight);

    scene.add(new THREE.AmbientLight(0xffffff, 0.25));
    scene.add(new THREE.HemisphereLight(0xaaaaaa, 0x444444, 0.7));

    // =========================
    // GRID (AT GROUND LEVEL)
    // =========================

    scene.add(new THREE.GridHelper(SIZE, SIZE, 0xffffff, 0xffffff));

    // =========================
    // INSTANCED MICROXELS
    // =========================

    const geometry = new THREE.BoxGeometry(1, 1, 1);

    const material = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      roughness: 0.6,
      metalness: 0.05,
      emissive: new THREE.Color(0x0a0a0a)
    });

    const instanced = new THREE.InstancedMesh(
      geometry,
      material,
      SIZE * SIZE * SIZE
    );

    const matrix = new THREE.Matrix4();
    const quaternion = new THREE.Quaternion();
    const activeScale = new THREE.Vector3(1, 1, 1);
    const hiddenScale = new THREE.Vector3(0, 0, 0);
    const tempPosition = new THREE.Vector3();
    const tempColor = new THREE.Color();
    const modelCenterOffset = (SIZE - 1) / 2;
    const groundOffset = 0.5;
    const idToCoord = [];

    let i = 0;

    for (let x = 0; x < SIZE; x++) {
      for (let y = 0; y < SIZE; y++) {
        for (let z = 0; z < SIZE; z++) {

          matrix.setPosition(
            x - modelCenterOffset,
            y + groundOffset,
            z - modelCenterOffset
          );

          instanced.setMatrixAt(i, matrix);
          idToCoord[i] = { x, y, z };
          instanced.setColorAt(i, tempColor.set(voxel.get(x, y, z).color));

          i++;
        }
      }
    }

    instanced.instanceMatrix.needsUpdate = true;
    instanced.instanceColor.needsUpdate = true;
    scene.add(instanced);

    function getMicroxelPosition(x, y, z) {
      return tempPosition.set(
        x - modelCenterOffset,
        y + groundOffset,
        z - modelCenterOffset
      );
    }

    function syncMicroxelVisual(instanceId) {
      const { x, y, z } = idToCoord[instanceId];
      const cell = voxel.get(x, y, z);

      if (!cell) return;

      const position = getMicroxelPosition(x, y, z);

      // Render state always comes from the microxel model.
      matrix.compose(
        position,
        quaternion,
        cell.active ? activeScale : hiddenScale
      );

      instanced.setMatrixAt(instanceId, matrix);
      instanced.setColorAt(instanceId, tempColor.set(cell.color));
      instanced.instanceMatrix.needsUpdate = true;
      instanced.instanceColor.needsUpdate = true;
    }

    function syncAllMicroxels() {
      for (let instanceId = 0; instanceId < idToCoord.length; instanceId++) {
        syncMicroxelVisual(instanceId);
      }
    }

    window.applyVoxelSaveData = (jsonText) => {
      try {
        const data = JSON.parse(jsonText);
        voxel.loadFromData(data);
        syncVoxelNameInput();
        syncAllMicroxels();

        return { ok: true, message: "Voxel loaded." };
      } catch (error) {
        return {
          ok: false,
          message: error instanceof Error ? error.message : "Invalid voxel JSON."
        };
      }
    };

    window.applyVoxelPreset = (presetName) => {
      if (!presetName) {
        return { ok: false, message: "Select a template first." };
      }

      try {
        voxel.applyPreset(presetName);
        syncAllMicroxels();

        return { ok: true, message: `Preset "${presetName}" loaded.` };
      } catch (error) {
        return {
          ok: false,
          message: error instanceof Error ? error.message : "Preset could not be loaded."
        };
      }
    };

    // =========================
    // HIGHLIGHT
    // =========================

    const highlight = new THREE.Mesh(
      new THREE.BoxGeometry(1.02, 1.02, 1.02),
      new THREE.MeshBasicMaterial({
        color: 0xff0000,
        transparent: true,
        opacity: 0.5
      })
    );

    scene.add(highlight);

    // =========================
    // RAYCAST (FIX: HOVER LIVES)
    // =========================

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function updatePointer(e) {
      pointer.x = (e.clientX / innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / innerHeight) * 2 + 1;
    }

    window.addEventListener('mousemove', updatePointer);

    function getHit() {
      raycaster.setFromCamera(pointer, camera);
      return raycaster.intersectObject(instanced)[0] || null;
    }

    // =========================
    // CLICK → MODIFY MICROXEL
    // =========================

    window.addEventListener('mousedown', () => {

      const hit = getHit();
      if (!hit) return;

      const { x, y, z } = idToCoord[hit.instanceId];

      const cell = voxel.get(x, y, z);

      if (cell) {
        cell.destroy();
        syncMicroxelVisual(hit.instanceId);
        console.log(`💥 destroyed microxel at ${x},${y},${z}`);
      }

      console.log("🧱 VOXEL STATE:", voxel);
    });

    // =========================
    // HIGHLIGHT UPDATE
    // =========================

    function updateHighlight() {

      const hit = getHit();

      if (!hit) {
        highlight.visible = false;
        return;
      }

      const { x, y, z } = idToCoord[hit.instanceId];

      highlight.position.set(
        x - modelCenterOffset,
        y + groundOffset,
        z - modelCenterOffset
      );

      highlight.visible = true;
    }

    // =========================
    // LOOP
    // =========================

    let lastFpsTime = performance.now();
    let frameCount = 0;

    function updateFps(now) {
      frameCount += 1;

      const elapsed = now - lastFpsTime;

      // Sample over a short window so the counter stays readable.
      if (elapsed < 250) return;

      const fps = Math.round((frameCount * 1000) / elapsed);
      fpsCounter.textContent = `FPS: ${fps}`;
      frameCount = 0;
      lastFpsTime = now;
    }

    function animate(now = performance.now()) {
      requestAnimationFrame(animate);
      updateFps(now);
      updateHighlight();
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

  </script>

</body>

</html>
