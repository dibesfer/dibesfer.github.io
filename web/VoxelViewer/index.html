<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VoxelViewer</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { touch-action: none; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// =========================
// CLASSES
// =========================

class Microxel {
  constructor(color = "#ffffff") {
    this.color = color;
    this.active = true;
  }

  destroy() {
    this.active = false;
  }
}

class Voxel {
  constructor(size = 15) {
    this.size = size;
    this.microxels = [];

    for (let x = 0; x < size; x++) {
      this.microxels[x] = [];
      for (let y = 0; y < size; y++) {
        this.microxels[x][y] = [];
        for (let z = 0; z < size; z++) {

          const isBorder =
            x === 0 || y === 0 || z === 0 ||
            x === size - 1 || y === size - 1 || z === size - 1;

          const color = isBorder ? "#000000" : "#55cc99";

          this.microxels[x][y][z] = new Microxel(color);
        }
      }
    }
  }

  get(x, y, z) {
    return this.microxels[x]?.[y]?.[z];
  }
}

// =========================
// WORLD
// =========================

const SIZE = 15;
const voxel = new Voxel(SIZE);

console.log("🔥 INITIAL VOXEL:", voxel);

// =========================
// THREE SETUP
// =========================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(20, 20, 20);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

// =========================
// LIGHTS (FIXED SYNTAX)
// =========================

const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
dirLight.position.set(15, 25, 10);
scene.add(dirLight);

scene.add(new THREE.AmbientLight(0xffffff, 0.25));
scene.add(new THREE.HemisphereLight(0xaaaaaa, 0x444444, 0.7));

// =========================
// GRID (AT GROUND LEVEL)
// =========================

scene.add(new THREE.GridHelper(SIZE, SIZE, 0x555555, 0x333333));

// =========================
// INSTANCED MICROXELS
// =========================

const geometry = new THREE.BoxGeometry(1, 1, 1);

const material = new THREE.MeshStandardMaterial({
  color: 0x55cc99,
  roughness: 0.6,
  metalness: 0.05,
  emissive: new THREE.Color(0x0a0a0a)
});

const instanced = new THREE.InstancedMesh(
  geometry,
  material,
  SIZE * SIZE * SIZE
);

const matrix = new THREE.Matrix4();
const idToCoord = [];

let i = 0;

for (let x = 0; x < SIZE; x++) {
  for (let y = 0; y < SIZE; y++) {
    for (let z = 0; z < SIZE; z++) {

      matrix.setPosition(
        x - SIZE / 2,
        y,                // 👈 FIX: suelo en y = 0
        z - SIZE / 2
      );

      instanced.setMatrixAt(i, matrix);
      idToCoord[i] = { x, y, z };

      i++;
    }
  }
}

instanced.instanceMatrix.needsUpdate = true;
scene.add(instanced);

// =========================
// HIGHLIGHT
// =========================

const highlight = new THREE.Mesh(
  new THREE.BoxGeometry(1.02, 1.02, 1.02),
  new THREE.MeshBasicMaterial({
    color: 0xff0000,
    transparent: true,
    opacity: 0.5
  })
);

scene.add(highlight);

// =========================
// RAYCAST (FIX: HOVER LIVES)
// =========================

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function updatePointer(e) {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
}

window.addEventListener('mousemove', updatePointer);

function getHit() {
  raycaster.setFromCamera(pointer, camera);
  return raycaster.intersectObject(instanced)[0] || null;
}

// =========================
// CLICK → MODIFY MICROXEL
// =========================

window.addEventListener('mousedown', () => {

  const hit = getHit();
  if (!hit) return;

  const { x, y, z } = idToCoord[hit.instanceId];

  const cell = voxel.get(x, y, z);

  if (cell) {
    cell.destroy();
    console.log(`💥 destroyed microxel at ${x},${y},${z}`);
  }

  console.log("🧱 VOXEL STATE:", voxel);
});

// =========================
// HIGHLIGHT UPDATE
// =========================

function updateHighlight() {

  const hit = getHit();

  if (!hit) {
    highlight.visible = false;
    return;
  }

  const { x, y, z } = idToCoord[hit.instanceId];

  highlight.position.set(
    x - SIZE / 2,
    y,
    z - SIZE / 2
  );

  highlight.visible = true;
}

// =========================
// LOOP
// =========================

function animate() {
  requestAnimationFrame(animate);
  updateHighlight();
  controls.update();
  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
