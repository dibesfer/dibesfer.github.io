<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VoxelViewer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="assets/brand/vvicon.png" type="image/x-icon">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>

  <div id="consola">
    <div id="supertitle">VoxelViewer</div>
    <div id="fpsCounter">FPS:</div>
    <div>
      Name:
      <input id="UIVoxelName" style="width: 120px;font: unset;border: solid 3px;" type="text" name="" placeholder="Table">
    </div>
    <div id="loadButton">⬇️Load</div>
    <div id="saveButton">💾Save</div>
    <div style="background-color: lightblue;">Log in</div>
  </div>

  <div id="menu" class="invisible">
    <h2>test</h2>
  
  </div>

  <div id="options">
    <div class="barTitle">⚙️Options</div>
    <div>
      🌈Color
      <input type="color" name="" id="">
      Picker
    </div>
    <div>🖌️Paint</div>

    <div>👇Place</div>
    
    <div class="option_selected">✖️Eraser</div>
    <div>↗️Line</div>
    <div>🔝Extrude</div>
    <div>📦Box Select</div>
    <div>
      🪞Mirror
      <input type="checkbox" name="" id="">X
      <input type="checkbox" name="" id="">Y
      <input type="checkbox" name="" id="">Z

    </div>
  </div>

  <!-- UI -->
  <script src="script.js"></script>

  <!-- Threejs -->
   <script src="three.js" type="module"></script>
</body>

</html>
