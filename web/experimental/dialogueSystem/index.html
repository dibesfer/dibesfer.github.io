<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dialogueSystem</title>
  <meta name="description" content="Creates random typewritten dialogues">
  <style>
    * {
      margin: 0;
      box-sizing: border-box;
    }

    #output {
      width: 100%;
      height: 100dvh;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: monospace;
      font-size: 1.123rem;
      color: white;
      text-shadow: 0 0 2.5px white;
      overflow-y: auto;
    }
  </style>
  <script src="/ferscript.js"></script>
</head>

<body>

  <div id="output">

  </div>

  <script>

    let dialogues = [
      "Welcome stranger",
      "The Youniverse is vast",
      "No space is limitted if ideas fit in",
      "you are in dibesfer.github.io",
      "What am A.I?",
      "Where do I come from and go to?",
      "Nothing's really as it seems, its so wonderfully different."
    ]

    let norepeat

    function write() {

      stopTypeWrite()
      
      output.textContent = ""

      let randomNum = randomInt(0, dialogues.length - 1)

      while (randomNum == norepeat) {
        randomNum = randomInt(0, dialogues.length - 1)
      }

      typeWrite(dialogues[randomNum], output )

      norepeat = randomNum

      setTimeout(write, 5000);

    }
    write()

    


    async function writeSequence(el, frases) {
      for (let f of frases) {
        await typeWriter(f, el);
        displayer.innerHTML += "<br><br>";
      }
    }

    //writeSequence(displayer, myLongText);

  </script>

</body>

</html>
