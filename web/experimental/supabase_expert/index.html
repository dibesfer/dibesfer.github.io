<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Expert</title>
    <link rel="icon" type="image/x-icon" href="/assets/branding/favicon512.ico">

    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        body {
            font-family: monospace;
            font-size: 1rem;
            line-height: 1.7;
            padding: 10px;
        }

        img {
            max-width: 100%;
        }

        header,
        footer {
            text-align: center;
        }

        a {
            text-decoration: none;
        }

        #demo {
            height: 300px;
            overflow: auto;
            background-image: linear-gradient(rgba(0, 0, 0, 0.2) ,rgba(0, 0, 0, 0));
            
        }

        .message {
            border: solid 1px;
            padding: 10px;
            display: flex;
            gap: 10px;
            
        }

        .message_img {
            
            line-height: 0;
        }

        .message_img > img {
            height: 4rem;
            width: 4rem;
            aspect-ratio: 1;
            object-fit: cover;
            filter: grayscale(1) brightness(2);
        }

        .message_text {
            flex: 1;
            word-break: break-all;
        }


        .invisible {
            display: none;
        }
    </style>

    <!-- SUPABASE cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>


</head>

<body>
    <header>
        <h1>Supabase Expert</h1>
    </header>

    <br>
    <hr>
    <br>

    <div id="demo"></div>
    <br>
    <input id="myInput" type="text" name="" maxlength="250">
    <button id="writeTable()" onclick="writeTable()">send</button>
    <br>

    <br>
    <hr>
    <br>

    <div>

        <h3>Log in</h3>
        <p>You are now <span id="displayUsername">Anonymous</span></p>

        <div id="loginDiv">
            <label for="">Username</label>
            <input type="text" id="userEmail">

            <br>
            <label for="">Password</label>

            <input type="password" id="userPass">

            <p id="consola">Fill both fields</p>
            <button onclick="login()">Log in</button>
        </div>
        <div id="logoutDiv" class="invisible">
            <button onclick="logout()">Log out</button>
        </div>

    </div>

    <br>
    <hr>
    <br>
    <h3>Technologies used:</h3>
    <ol>
        <li>Tables</li>
        <ol>
            <li>RLS Policies</li>
            <li>Realtime</li>
        </ol>
        <li>Presence</li>
        <li>Auth</li>
    </ol>
    <footer>

        <br>
        <hr>
        <br>
        <p>Users online: <span id="displayUsersonline">1</span></p>
        <p>Local visits: <span id="displayLocalvisits"></span></p>
        <p>made by <a href="https://dibesfer.github.io">dibesfer</a></p>
    </footer>
    <script>
        // Using supabase Webochi projectt
        const supabaseUrl = 'https://kalidybwmoxhcwlfeftc.supabase.co'
        const supabaseKey = 'sb_publishable__jr8YglR8G9zZQQfLPLzqw_GxL2RA-A'
        const database = supabase.createClient(supabaseUrl, supabaseKey)

        let tableRows = 1
        //console.log(database)

        //REALTIME 
        // Create a function to handle inserts
        const handleInserts = (payload) => {
            //console.log('Change received!', payload)

            getOnlyLastMessage(payload.new)
            //getOnlyResources("chat", "dibesfer")
        }

        const handleDeletes = (payload) => {
            //console.log('Change received!', payload)

            readTable()
            //getOnlyLastMessage(payload.new)
            //getOnlyResources("chat", "dibesfer")
        }

        // Listen to inserts
        database
            .channel('supabase_expert')
            // .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'supabase_expert' }, handleInserts)
            // .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'supabase_expert' }, handleDeletes)
            .on('postgres_changes',
                { schema: 'public', table: 'supabase_expert', event: '*' },
                (payload) => {
                    if (payload.eventType === 'INSERT') handleInserts(payload)
                    if (payload.eventType === 'DELETE') handleDeletes(payload)
                }
            )

            .subscribe()



        function formatMessage(time, message, timezone, username) {
            if (!username){
                username = "Anonymous"
            }
            else username = username.split("@")[0]
            const myDate = new Date(time).toISOString().slice(0, 10) + " " + new Date(time).toISOString().slice(11, 19)
            return `
            <div class="message">
                <div class="message_img">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRxJpQCWWBAh3ksKDVo-QPx2obmf8QlmSvUsg&s">
                </div>
                <div class="message_text">
                    <p>(${tableRows}) ${myDate} (${timezone})<br><b>${username}</b>: ${message}</p>
                </div>
            </div>
                `
        }

        async function readTable() {
            const { data, error } = await database

                .from('supabase_expert')

                .select()
            console.log(data.length)

            let myHTML = ""
            for (let i = 0; i < data.length; i++) {
                const element = data[i];
                myHTML += formatMessage(element.created_at, element.message, element.timezone, element.username)
                tableRows++
            }

            demo.innerHTML = myHTML
            demo.scrollTo(0, demo.scrollHeight)
        }


        readTable()

        function getOnlyLastMessage(newInsert) {

            const myTime = new Date(newInsert.created_at).toISOString().slice(0, 10) + " " + new Date(newInsert.created_at).toISOString().slice(11, 19)

            demo.innerHTML += formatMessage(newInsert.created_at, newInsert.message, newInsert.timezone, newInsert.username)
            tableRows++
            demo.scrollTo(0, demo.scrollHeight)

        }

        async function writeTable() {
            let myUsername = "Anonymous"
            if(TheUser){
                myUsername = TheUser.email
            }
            const myMessage = myInput.value

            if (myMessage != "") {
                const { error } = await database
                    .from('supabase_expert')
                    .insert({
                        message: myMessage,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                        username: myUsername
                    })
                    
                if (!error) {
                    myInput.value = ""
                }
            }
        }

        //AUTH

        async function getUser() {
            const { data: { user } } = await database.auth.getUser()

            if (user) {
                displayUsername.textContent = user.email
                consola.textContent = "Logged in"
                loginDiv.classList.toggle("invisible")
                logoutDiv.classList.toggle("invisible")
                console.log(user)
                return user
            }
        }

        // TOP PRIORITY
        let TheUser
        async function setUser(){
            TheUser = await getUser()
        }
        setUser()
        
        

        async function login() {
            let { data, error } = await database.auth.signInWithPassword({
                email: userEmail.value,
                password: userPass.value
            })
            if (error) {
                consola.textContent = error.message
            }
            else {
                setUser()
            }
        }

        async function logout() {
            let { error } = await database.auth.signOut()
            if (!error) location.reload()
        }

        //PRESENCE

        const channel = database.channel("online-users", {
            config: {
                presence: { key: 0 }
            }
        })

        channel
            .on("presence", { event: "sync" }, () => {
                const state = channel.presenceState()
                //console.log("Online users:", state)
                const count = Object.keys(channel.presenceState()).length
                displayUsersonline.textContent = count
            })
            .subscribe(async (status) => {
                if (status === "SUBSCRIBED") {
                    await channel.track({
                        user_id: "Anonymous",
                        username: "Anonymous"
                    })
                }
            })

        // LOCAL STORAGE
        let localVisits = localStorage.getItem("sb_LocalVisits")
        if (localVisits == null || localVisits <= 0) {
            localVisits = 1
        }
        else {
            localVisits++
        }

        displayLocalvisits.textContent = localVisits
        localStorage.setItem("sb_LocalVisits", localVisits)


    </script>

</body>

</html>
