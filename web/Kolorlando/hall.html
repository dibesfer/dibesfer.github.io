<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolorlando Hall</title>
    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        img {
            max-width: 100%;
        }

        body {
            font-family: sans-serif;
            text-align: center;
            line-height: 2;
        }


        header,
        footer {
            padding: 40px;
            background-color: rgb(255, 225, 168);
        }

        #info {
            padding: 40px;
            background-color: rosybrown;
        }

        

        #playButton {
            border: solid 6px green;
            color: rgb(0, 52, 0);
            background-color: rgb(72, 255, 72);
            margin-top: 10px;
            padding: 5px;
            min-width: 220px;
            font: unset;
            font-size: 2rem;
            font-family: var(--uiFont);
            transition: 0.2s;
        }

        #playButton:hover {
            color: white;
        }

        #playButton:active {
            color: red;
        }

        #kImages {
            width: 100%;
            padding: 40px 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            align-items: center;
        }

        #kLevels {
            width: 30%;
            height: 100%;
            overflow: hidden;
            background-color: rgb(180, 136, 136);
            border: solid 2px;
            border-radius: 15px;
            transition: 0.2s;
        }

        #kLevels > div {
            aspect-ratio: 16/9;
            height: 100%;
            width: 100%;
            transition: 0.2s;
            overflow: hidden;
        }

        #kLevels > div > img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: 0.2s;
            overflow: hidden;
           
            display: block;

        }

        #kLevels:hover {
            box-shadow: inset 0 0 25px white;
                        background-color: rgb(219, 187, 187);

            
        }
        #kLevels>div>img:hover {
            transform: scale(1.25);
        }

        @media screen and (max-width: 1000px) {
            #kLevels {
                width: 40%;
                margin: 10px;

            }
        }

        @media screen and (max-width: 800px) {
            #kLevels {
                width: 100%;
                margin: 10px;

            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Kolorlando</h1>
        <p>A 3D world to build and explore</p>

    </header>
    <div id="kImages">
        <div id="kLevels">
            <h2>Your Avatar</h2>
            <div>
                
                <img src="assets/imagenesPortada/Captura desde 2026-03-09 11-11-06.png" alt="">
            </div>
            <p>Customize your character</p>
        </div>

        <div id="kLevels" onclick="window.location = '/web/Kolorlando/game.html' ">
            <h2>Your Worlds</h2>
            <div>
                
                <img src="assets/imagenesPortada/Captura desde 2026-03-10 13-01-58.png" alt="">
            </div>
            <p>Save your progress!</p>
        </div>

        <div id="kLevels">
            <h2>Galaxy</h2>
            <div>
                <img src="assets/imagenesPortada/Captura desde 2026-03-10 13-02-09.png" alt="">
            </div>
            <p>Explore others' worlds!</p>
        </div>
    </div>
    <div id="info">
        <h3>What is Kolorlando?</h3>
        <p>Kolorlando is a 3D browser game.</p>
        <p>Visit <a href="/web/Kolorlando/">landing page</a></p>
    </div>

    
    <footer>

        <p>Contact <a href="mailto:dibesfer@gmail.com">dibesfer@gmail.com</a></p>
        <p>ThreeJS + dibesfer + Codex</p>

    </footer>
</body>

</html>
