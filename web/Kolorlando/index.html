<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolorlando</title>
    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        img {
            max-width: 100%;
        }

        body {
            font-family: sans-serif;
            text-align: center;
            line-height: 2;
        }

        header {
            background-image: url(assets/grid-bg-ChatGPT\ Image\ 14\ mar\ 2026\,\ 22_49_52.png);
            background-size: cover;
            filter: saturate(0);
            color: white;
            text-shadow: 0 0 15px black;
            background-position: center;
        }

        header , footer {
            padding: 30px;
            background-color: rgb(254, 168, 255);
        }

        #info {
            padding: 60px;
            background-color: rosybrown;
        }

        #kImages {
            width: 100%;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            align-items: center;

        }

        #kImages>div {

            width: 30%;

            aspect-ratio: 16/9;
            overflow: hidden;

            background-color: rgb(215, 96, 96);
            border: solid 3px black;
        }

        #playButton {
            border: solid 6px green;
            color: rgb(0, 52, 0);
            background-color: rgb(72, 255, 72);
            margin-top: 10px;
            padding: 5px;
            min-width: 220px;
            font: unset;
            font-size: 2rem;
            font-family: var(--uiFont);
            transition: 0.2s;
        }

        #playButton:hover {
            color: white;

        }

        #playButton:active {
            color: red;
        }

        #kImages>div>img {

            /* height: 100%;
            width: 100%;
            object-fit: cover; */
            transition: 0.2s;

        }

        #kImages>div>img:hover {
            transform: scale(1.25);
        }

        @media screen and (max-width: 1000px) {
            #kImages>div {
                width: 40%;
                margin: 20px;

            }
        }

        @media screen and (max-width: 800px) {

            #kImages {
                padding: 0;
            }
            #kImages>div {
                width: 100%;
                margin: 20px;

            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Kolorlando Landing Page</h1>
        <p>A 3D world to build and explore</p>

    </header>
    <div id="kImages">
        <div>
            <img src="assets/imagenesPortada/Captura desde 2026-03-09 11-11-06.png" alt="">
        </div>

        <div>
            <img src="assets/imagenesPortada/Captura desde 2026-03-10 13-01-58.png" alt="">
        </div>

        <div>
            <img src="assets/imagenesPortada/Captura desde 2026-03-10 13-02-09.png" alt="">
        </div>
    </div>

    <br>
    <button id="playButton" onclick="window.location='/web/Kolorlando/hall.html'">PLAY</button>
    <br><br>

    <div id="info">
        <h3>What is Kolorlando?</h3>
        <p>Kolorlando is a 3D browser game.</p>
        <p>You have a voxely avatar, and you appear on a voxel world.</p>
        <p><a href="/web/Kolorlando/characteristics.html">Characteristics</a></p>
    </div>

    
    <footer>
        
        <p>Contact <a href="mailto:dibesfer@gmail.com">dibesfer@gmail.com</a></p>

        <p>ThreeJS + dibesfer + Codex</p>
        
    </footer>
</body>

</html>
