<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dibesfer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/branding/favicon512.ico" type="image/x-icon">

    <!-- seo -->
    <meta name="author" content="dibesfer - Fer Minero">
    <meta name="description" content="dibesfer - dibujos y escritos de Fer - Dev Illustrauthor">
    <meta name="keywords" content="dibesfer, fer, illustration, indie games, web dev, worldbuilding">

    <!-- og embeddable -->
       <!-- Meta imágen y descripción que aparecerá embebida en algunas redes sociales -->
    <meta property="og:title" content="dibesfer">
    <meta property="og:description" content="Dev Illustrauthor">
    <meta property='og:image' content='https://dibesfer.github.io/assets/branding/dibesfer-whiteborard-square.png'/>
</head>

<body>
    <header>
        <a href="">
            <img class="invertable icon" src="/assets/branding/dibesfer-logo.svg" alt="logo">
            <h1>
                <img class="invertable icon" style="color: black;" src="assets/branding/dibesfer-title.png"
                    alt="dibesfer">
            </h1>
        </a>
        <!-- <p><b>Dib</b>ujos y <u>es</u>critos de <i>Fer</i></p> -->
        <p><span id="desc" class="invisible">Dibujos y escritos de Fer</span></p>
    </header>

    <main>
        <div class="onlyDesktop maxWidth">
            <br>
            <hr><br>
        </div>
        <div class="flexo3">
            <div>
                <a href="assets/pages/nav/?page=gallery">
                    <h2>Gallery</h2>
                    <img class="displayMain" src="assets/gallery/azamshir-y-amigos.png" alt="Azamshir and friends">
                    <p>Digital and physical art</p>
                </a>
            </div>
            <div>
                <a href="assets/pages/nav/?page=games">
                    <h2>Games</h2>
                    <img class="displayMain" src="assets/games/colorlandia-spawn.png" alt="colorlandia spawn">
                    <p>JS, Unity, Luanti, Godot, Unreal...</p>
                </a>
            </div>
            <div>
                <a href="assets/pages/nav/?page=web">
                    <h2>Web</h2>
                    <img class="displayMain" src="assets/web/web.png" alt="web showcase">
                    <p>HTML, CSS and JS</p>
                </a>
            </div>
        </div>
        <br>
        <div class="maxWidth" style="height: 6rem;">
            <iframe width="100%" style="height: 6rem;" src="assets/web/dibesfer_ads/" frameborder="0"></iframe>
        </div>
        <div class="onlyDesktop maxWidth">
            <br>
            <hr><br>
        </div>
    </main>

    <footer>
        <img class="invertable icon" src="/assets/branding/fer-logo.svg" alt="">
        <p><a target="_blank" href="https://liberapay.com/dibesfer">donate</a></p>
        <iframe width="100%" src="/assets/components/counter/?url=gallery" frameborder="0"
            style="border:none; height:3rem;"></iframe>
        <p>dibesfer@gmail.com</p>
    </footer>

    <script src="assets/code/sb.js"></script>
    <!-- <script type="module" src="script.js"></script> -->

</body>

</html>
