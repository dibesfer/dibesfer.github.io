<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dibesfer - miniprogress</title>

    <style>
        * {
            user-select: none;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            color: white;
            -webkit-touch-callout: none;
            touch-action: none;
            font-size: 1rem;
            font-family: monospace;
            line-height: 1.5;
            cursor: none;
            min-height: 100vh;
            transition: 0.2s ease-out;
            overflow: hidden;
        }

        .boxShadowed {
            box-shadow: inset 0 0 40px 10px rgba(255, 255, 255, 0.25);
        }

        #counter {
            display: flex;
        }

        #counterUnit {
            filter: brightness(10);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-left: 0.25rem;
        }

        #counterUnitImage {
            filter: drop-shadow(0 0 5px gold) ;
            
        }

        button {
            font: unset;
            border: unset;
            padding: 5px;
            cursor: unset;
            transition: 0.2s;
        }

        #restartBtn {
            line-height: 0;
            border-radius: 50%;
            background-color: rgb(255, 83, 83);
            color: white;
            position: absolute;
            top: 15px;
            right: 15px;
            filter: contrast(2);
        }

        #restartBtn:hover {
            background-color: rgb(255, 217, 0);
        }

        #restartBtn:active {
            background-color: rgb(113, 17, 17);
        }

        #gameUI {
            position: absolute;
            top: 15px;
            left: 15px;
        }

        .invisible {
            display: none;
        }

        #cursorImg {
            position: fixed;
            width: 48px;
            height: 48px;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(1);
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
            display: none;
            filter: invert(1);
        }

        #cursorImg.zoom {
            transform: translate(-50%, -50%) scale(0.5);
        }

        #miniFieldset {
            border: 1px solid white;
            position: relative;
            top: 10px;
            font-size: 0.75rem;
            line-height: 1;
            background-color: rgb(62, 62, 62);
        }

        #miniFieldset>legend {
            background-color: rgb(62, 62, 62);
            border: 1px solid white;
            padding: 5px;
        }

        @keyframes myAnimation {
            0% {
                transform:
                    rotate(0deg) 
                    scale(1);
            }

            100% {
                transform:
                    rotate(360deg)
                    scale(1.55);
            }
        }

        .rotated360 {
            animation-name: myAnimation;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            animation-direction: alternate;
        }
    </style>
</head>

<body>

    <div id="screen">

        <div id="consola"></div>

        <div id="gameUI">

            <div id="counter">
                <span id="counterDisplay">0</span>

                <div id="counterUnit" class="rotated360">
                    <img id="counterUnitImage" width="20px" style="height: 20px; line-height: 0;"
                        src="Symmetrical_8-pointed_star.svg" alt="Symmetrical 8 pointed star">
                </div>
            </div>

            <fieldset id="miniFieldset" class="invisible">
                <legend>Legend</legend>

                <p>Per load: +1</p>
                <p>Per second: +1</p>
                <p>Per click: +1</p>
                <p>Per hold: +4/s</p>
            </fieldset>

        </div>

        <br>

        <button id="restartBtn" onclick="restart()">
            <img width="20px" height="20px" style="height: 100%;" src="Power_off_icon.svg" alt="Power off icon">
        </button>

    </div>

    <img id="cursorImg" src="Chaos_star.svg" draggable="false">

    <script>

        document.addEventListener("contextmenu", e => e.preventDefault());

        // =========================================================
        // counter
        // =========================================================

        let miniCounter = 0;
        let pending = false;

        function saveMiniCounter() {
            localStorage.setItem(
                "dibesfer_miniCounter",
                String(miniCounter)
            );
        }

        function loadMiniCounter() {

            const raw =
                localStorage.getItem("dibesfer_miniCounter");

            const parsed =
                Number(raw);

            return Number.isFinite(parsed)
                ? parsed
                : 0;
        }

        function updateCounterDisplay() {
            counterDisplay.textContent =
                numberConversor(miniCounter);
        }

        function numberConversor(n) {

            if (
                n == null ||
                typeof n !== "number"
            ) {
                return "";
            }

            const tiers = [
                [1_000_000_000, "B"],
                [1_000_000, "M"],
                [1_000, "K"],
            ];

            for (const [threshold, suffix] of tiers) {

                if (n >= threshold) {

                    const val =
                        Math.floor((n / threshold) * 10) / 10;

                    return val + suffix;
                }
            }

            return String(n);
        }

        function miniCounterPush(value) {

            miniCounter += value;

            saveMiniCounter();

            updateCounterDisplay();

            counterUnitImage.style = `
                filter: contrast(0) drop-shadow(0 0 5px white)
            `;

            if (!pending) {

                pending = true;

                setTimeout(() => {

                    counterUnitImage.style = `
                        filter: drop-shadow(0 0 5px gold)
                    `;

                    pending = false;

                }, 75);
            }
        }

        function restart() {

            miniCounter = 0;

            saveMiniCounter();

            updateCounterDisplay();
        }

        function main() {

            miniCounter = loadMiniCounter();

            updateCounterDisplay();

            miniCounterPush(1);
        }

        // =========================================================
        // cursor visuals
        // =========================================================

        const cursorImg =
            document.getElementById("cursorImg");

        function showCursor(x, y) {

            cursorImg.style.left =
                x + "px";

            cursorImg.style.top =
                y + "px";

            cursorImg.style.display =
                "block";
        }

        function hideCursor() {

            cursorImg.style.display =
                "none";

            cursorImg.classList.remove("zoom");
        }

        // =========================================================
        // unified input
        // =========================================================

        let isPressing = false;
        let pressId = 0;

        let holdTimeout = null;
        let holdInterval = null;

        function onPress(x, y) {

            if (isPressing) return;

            isPressing = true;

            const myId = ++pressId;

            showCursor(x, y);

            cursorImg.classList.add("zoom");

            document.body.classList.add("boxShadowed");

            miniCounterPush(1);

            holdTimeout = setTimeout(() => {

                if (pressId !== myId) return;

                holdInterval = setInterval(() => {

                    if (pressId !== myId) {

                        clearInterval(holdInterval);

                        return;
                    }

                    miniCounterPush(1);

                }, 250);

            }, 250);
        }

        function onMove(x, y) {
            showCursor(x, y);
        }

        function onRelease(id = null) {

            if (!isPressing) return;

            if (
                id !== null &&
                id !== pressId
            ) {
                return;
            }

            isPressing = false;

            cursorImg.classList.remove("zoom");

            document.body.classList.remove("boxShadowed");

            clearTimeout(holdTimeout);
            clearInterval(holdInterval);

            holdTimeout = null;
            holdInterval = null;
        }

        // =========================================================
        // mouse
        // =========================================================

        const isMouse =
            window.matchMedia(
                "(hover: hover) and (pointer: fine)"
            ).matches;

        if (isMouse) {

            document.documentElement.addEventListener(
                "mousemove",
                (e) => onMove(e.clientX, e.clientY)
            );

            document.documentElement.addEventListener(
                "mouseleave",
                () => {
                    hideCursor();
                    onRelease(pressId);
                }
            );

            document.documentElement.addEventListener(
                "mousedown",
                (e) => onPress(e.clientX, e.clientY)
            );

            document.documentElement.addEventListener(
                "mouseup",
                () => onRelease(pressId)
            );
        }

        // =========================================================
        // touch
        // =========================================================

        document.addEventListener(
            "touchstart",
            (e) => {

                const t = e.touches[0];

                onPress(
                    t.clientX,
                    t.clientY
                );

            },
            { passive: true }
        );

        document.addEventListener(
            "touchmove",
            (e) => {

                const t = e.touches[0];

                onMove(
                    t.clientX,
                    t.clientY
                );

            },
            { passive: true }
        );

        document.addEventListener(
            "touchend",
            () => {
                hideCursor();
                onRelease(pressId);
            }
        );

        document.addEventListener(
            "touchcancel",
            () => {
                hideCursor();
                onRelease(pressId);
            }
        );

        // =========================================================
        // safety net
        // =========================================================

        document.addEventListener(
            "visibilitychange",
            () => {

                if (document.hidden) {

                    hideCursor();

                    onRelease(pressId);
                }
            }
        );

        window.addEventListener(
            "blur",
            () => {

                hideCursor();

                onRelease(pressId);
            }
        );

        // =========================================================
        // ui
        // =========================================================

        function showLegend() {
            miniFieldset.classList.toggle("invisible");
        }

        counter.addEventListener(
            "click",
            showLegend
        );

        // =========================================================
        // start
        // =========================================================

        window.addEventListener("storage", (e) => {

            if (e.key === "dibesfer_miniCounter") {

                miniCounter = loadMiniCounter();

                updateCounterDisplay();
            }
        });

        main();

        const miniInterval =
            setInterval(
                () => miniCounterPush(1),
                1000
            );

    </script>

</body>

</html>
