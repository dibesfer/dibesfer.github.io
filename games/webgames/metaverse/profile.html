    <script>
        const supabaseUrl = 'https://qugihsopwjemzakhrbvw.supabase.co'
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1Z2loc29wd2plbXpha2hyYnZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE2OTg0OTQxMDksImV4cCI6MjAxNDA3MDEwOX0.1q5fBic1cjueaiP2-p6W19C68ye8FTPLFne2a-fKwZ8'
        const database = supabase.createClient(supabaseUrl, supabaseKey)

        var showTest = getid("showTest")
        var consola = getid("consola")
        var formattedName;
        function createNewUser() {
            let nameInput = getid("nameInput")
            let passwordInput = getid("passwordInput")

            if (nameInput.value != "") {

                formattedName = nameInput.value.toLowerCase()
                formattedName = formattedName.normalize("NFD").replace(/\p{Diacritic}/gu, "").replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").replace(/\s{2,}/g," ");
                 //link https://stackoverflow.com/questions/990904/remove-accents-diacritics-in-a-string-in-javascript
                // https://stackoverflow.com/questions/4328500/how-can-i-strip-all-punctuation-from-a-string-in-javascript-using-regex
                consola.innerHTML = formattedName
                compareUsername(formattedName, passwordInput.value)

            }

        }

        async function insertResources(tableName, name, password) {
            const { data, error } = await database
                .from(tableName)
                .insert([
                    {
                        name: name,
                        password: password,
                        //email: param1,
                        //username: param1.split("@")[0]
                    },
                ])
                .select()
        }

        getResources("metaverse", "*")

        async function compareUsername(name, password) {
            const res = await database.from("metaverse").select("name").eq("name", name)
            if (res.data[0] != undefined) {
                consola.innerHTML = "User already signed"
                
            }
            else if (passwordInput.value != "") {
                insertResources("metaverse", name, password)

            }
        }


        async function getResources(tableName, rowName) {
            const res = await database.from(tableName).select(rowName)

            res.data.forEach(element => {
                showTest.innerHTML += element.name + "<br>"
            });


            /*if (res.data[0] != undefined) {
                feed.innerHTML = "<p>" + res.data[0].created_at.split("T")[0] + "</p>"

                res.data.forEach(element => {
                    feed.innerHTML += "<i>" + element.created_at.split("T")[1].split(".")[0] + "</i> <b>" + element.author + "</b>: " + element.message + "</br>"
                });
            }
            feed.scrollTop = feed.scrollHeight*/
        }

        function logIn() {
            let nameInput = getid("nameInput")
            let passwordInput = getid("passwordInput")

            checkPassword("metaverse", "*", nameInput.value, passwordInput.value)

        }

        async function checkPassword(tableName, rowName, name, password) {
            const res = await database.from(tableName).select(rowName).eq("name", name).eq("password", password)
            if (res.data[0] != undefined) {
                consola.innerHTML = "Logged in!"
            }
            else {
                consola.innerHTML = "Something went wrong!"
            }
        }


    </script>
