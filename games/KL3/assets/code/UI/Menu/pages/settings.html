<div class="menuSection">

    <fieldset>
        <legend>Render</legend>
        <label>Render bugeter MEDIUM</label>
        <input type="number" name="" id="" value="48" min="0" max="100">
        <br>
        <label>Chunk rendering distance</label>
        <input type="number" name="" id="" value="60" min="0" max="100">
        <br>
        <label>LOD</label>
        <input type="checkbox" name="" id="">

    </fieldset>

    <fieldset>
        <legend>Camera</legend>
        <label>Camera FOV</label>
        <input type="number" name="" id="" value="72" min="0" max="120">

        <label>Undersampling (+pixelated upscale)</label>
        <input type="checkbox" name="" id="">

        <label for="settingWireframe">Debug mode (wireframe, vertex-color)</label>
        <input
            type="checkbox"
            id="settingWireframe"
            data-setting="wireframe"
            data-setting-type="checkbox"
        >
    </fieldset>

    <button style="margin: auto;">Restore all defaults</button>
</div>
