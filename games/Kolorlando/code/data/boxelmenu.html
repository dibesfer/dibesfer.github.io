<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
        }

        img {
            max-width: 100%;
        }

        #title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 5rem;
        }

        #logo {
            width: 150px;
        }

        .boxel-gallery {
            display: flex;
            flex-wrap: wrap;

        }

        .boxel-gallery > div {
            flex: 33%;
            max-width: 33%;
            aspect-ratio: 1;
            
            padding: 15px;
            transition: 0.2s;
        }

        .boxel-gallery > div:has(.boxel-item:hover){
            padding: 0px;
        }

        .boxel-item {
            font-size: 1.5rem;
            width: 100%;
            height: 100%;
            background-color: rgb(164, 164, 255);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 10px 10px rgba(0, 0, 0, 0.587);
            cursor: pointer;
        }

         .boxel-gallery > div > div > div {
           border: solid 1px black;
           
         }

         .boxel-image{
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 5px;
         }
         .boxel-image > img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px white);
         }
         .boxel-description {
            padding: 5px;
         }
    </style>
</head>

<body>
    <div id="title">
        <div id="logo">
            <img src="../../assets/icons/boxel.png" alt="">
        </div>
        <div>
            Boxel Save
        </div>
    </div>
    <div class="boxel-gallery">
        <div>
            <div class="boxel-item">
                <div class="boxel-image">
                    <img src="../../assets/icons/boxel-house.png" alt="">
                </div>
                <div class="boxel-description">House</div>
            </div>
        </div>
        <div>
            <div class="boxel-item">
                <div class="boxel-image">
                    <img src="../../assets/icons/boxel.png" alt="">
                </div>
                <div class="boxel-description">Tree</div>
            </div>
        </div><div>
            <div class="boxel-item">
                <div class="boxel-image">
                    <img src="../../assets/icons/boxel-flower.png" alt="">
                </div>
                <div class="boxel-description">Flower</div>
            </div>
        </div><div>
            <div class="boxel-item">
                <div class="boxel-image">
                    <img src="/assets/branding/fergames-logo.png" alt="">
                </div>
                <div class="boxel-description">Car</div>
            </div>
        
    </div>
</body>

</html>
