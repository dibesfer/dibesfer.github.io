<div class="menuSection">
    <h3 id="woxelName">Woxel</h3>
    <p>Size: <span id="woxelSize">-</span></p>
    <p>Memory: <span id="woxelMemoryStatus">checking...</span></p>
    <br>
    <button id="saveWoxelButton" type="button">Save</button>
    <button id="loadWoxelButton" type="button">Load</button>
    <br>
    <br>
    <hr>
    <br>
    <h4>Create a new Woxel</h4>
    <select id="woxelTemplateSelect">
        <option value="grass">Grass</option>
        <option value="grassWithFlowers" selected>Grass with flowers</option>
        <option value="randomLand">Random land</option>
        <option value="randomAll">Random ALL</option>
    </select>
    <button id="createWoxelButton" type="button">Create</button>

    <input
        id="loadWoxelInput"
        type="file"
        accept=".woxel,application/octet-stream"
        hidden
    >
</div>
