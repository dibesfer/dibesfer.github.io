<div id="joysticks" hidden>
    <div id="joysticksLeft">
        <div class="joystick" data-joystick="move" aria-label="Movement joystick">
            <div class="joystickPad">
                <span class="joystickIcon">✳</span>
                <!-- old symbol: ✥ -->
            </div>
        </div>

        <div id="joystickLeftDown" class="joystickButton" data-mobile-action="down">⬇️</div>
        <div id="joystickLeftUp" class="joystickButton" data-mobile-action="up">?</div>
        <div id="joystickLeftChat" class="joystickButton" data-mobile-action="chat">💬</div>
        <div id="joystickLeftSprint" class="joystickButton" data-mobile-action="sprint">Run</div>
    </div>

    <div id="joysticksRight">
        <div class="joystick" data-joystick="look" aria-label="Look joystick">
            <div class="joystickPad">
                <span class="joystickIcon">⌖</span>
            </div>
        </div>

        <div id="joystickRightAction" class="joystickButton" data-mobile-action="primary">✋</div>
        <div id="joystickRightSecondary" class="joystickButton" data-mobile-action="secondary">🤚</div>
        <div id="joystickRightJump" class="joystickButton" data-mobile-action="jump">Up <!-- caution here not to confuse with #joystickLeftUp --></div>
        <div id="joystickRightMenu" class="joystickButton" data-mobile-action="menu">≡</div>
    </div>
</div>
