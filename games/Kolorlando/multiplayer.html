<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kolorlando</title>
    <link rel="stylesheet" href="style.css">

    <link rel="shortcut icon" href="assets/icons/favicon/android-chrome-512x512.png" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Sans+Mono:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">

    <style>
        /* This compact overlay keeps the online counter visible during play
        without interfering with the rest of the HUD layout. It is anchored
        to the top center of the screen so the existing Supabase Presence
        counter can update a real on-screen element on this page. */
        #peopleOnlineHud {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 0.45rem 0.9rem 0.55rem;
            border: 2px solid rgba(255, 255, 255, 0.75);
            border-top: 0;
            border-radius: 3px;
            background: rgba(15, 16, 22, 0.72);
            color: #ffffff;
            font-family: "Ubuntu Sans Mono", monospace;
            font-size: 0.95rem;
            line-height: 1;
            text-align: center;
            pointer-events: auto;
            backdrop-filter: blur(6px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28);
            cursor: pointer;
        }

        /* The number gets a little extra weight so it is easier to scan while
        moving around the scene. */
        #peopleOnlineCount {
            font-weight: 700;
        }

        /* The button keeps the debug panel tiny until it is needed, while still
        making the whole People online pill clickable during multiplayer tests. */
        #peopleOnlineToggle {
            display: block;
            border: 0;
            padding: 0;
            margin: 0;
            background: transparent;
            color: inherit;
            font: inherit;
            cursor: inherit;
            pointer-events: none;
        }

        /* The dropdown stays deliberately compact so it does not cover the
        scene, but still gives us enough room to inspect live Presence values. */
        #peopleOnlinePanel {
            display: none;
            width: min(240px, 68vw);
            margin-top: 0.4rem;
            padding-top: 0.4rem;
            border-top: 1px solid rgba(255, 255, 255, 0.22);
            font-size: 0.7rem;
            line-height: 1.25;
            text-align: left;
        }

        #peopleOnlineHud.is-open #peopleOnlinePanel {
            display: block;
        }

        #peopleOnlineList {
            max-height: 120px;
            overflow: auto;
        }

        #peopleOnlineList div + div {
            margin-top: 0.2rem;
        }
    </style>

    <script>
        window.KOLORLANDO_MODE = 'multiplayer';
    </script>

    <!-- SUPABASE cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script type="importmap">
    {
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@v0.182.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@v0.182.0/examples/jsm/"
    }
    }
    </script>

</head>

<body>

    <div id="peopleOnlineHud" aria-live="polite">
        <button id="peopleOnlineToggle" type="button" aria-expanded="false" aria-controls="peopleOnlinePanel">
            People online: <span id="peopleOnlineCount">0</span>
        </button>
        <div id="peopleOnlinePanel">
            <div id="peopleOnlineList">No players yet.</div>
        </div>
    </div>

    <div id="loadingScreen" role="status" aria-live="polite">
        <div id="loadingContent">
            <h1>Loading Voxelandia</h1>
            <div id="loadingBarTrack">
                <div id="loadingBarFill"></div>
            </div>
            <p id="loadingText">Loading assets... 0%</p>
        </div>
    </div>

    <div id="consola">
        <p>FPS: </p>
    </div>

    <div id="chatBox">
        <div id="chatBoxOutput">
            <div>12:11 Server says: Hello World!</div>
            <div>12:28 Julius: I'm here!</div>
            <div>12:32 Mark: Hii</div>
            <div>12:35 Maria: Hola</div>
            <div>12:37 Luis: wasup?</div>
        </div>
        <input type="text" name="" id="chatBoxInput" enterkeyhint="send" hidden>
    </div>

    <div id="miniMap">

    </div>

    <div id="playerHud">
        <div id="voxelReadout">Target: none</div>
        <div id="playerHealthBar" aria-label="Player health">
            <div id="playerHealthFill"></div>
            <span id="playerHealthText">100 / 100</span>
        </div>
        <div id="hotbar" aria-label="Hotbar">
            <div class="hotbar-slot is-selected"></div>
            <div class="hotbar-slot"></div>
            <div class="hotbar-slot"></div>
            <div class="hotbar-slot"></div>
            <div class="hotbar-slot"></div>
            <div class="hotbar-slot"></div>
            <div class="hotbar-slot"></div>
            <div class="hotbar-slot"></div>
        </div>
    </div>

    <div id="menuCentralMount"></div>

    <div id="menuInferior" hidden>

        <div id="menuInferiorLeft">

            <div class="joystick">
                <div class="pad">
                    <img class="icon" src="assets/Movimiento.png" alt="icono de movimiento" width="50" height="50"
                        decoding="async">

                </div>
            </div>

            <div id="Left2" class="button">
                down
            </div>
            <div id="buttonUp" class="button">
                up
            </div>

            <div id="Left0" class="button">
                💬
            </div>
            <div id="Left1" class="button">
                Sprint
            </div>
        </div>

        <div id="menuInferiorRight">

            <div class="joystick">
                <div class="pad">
                    <img class="icon" src="assets/Mirilla rifle.png" alt="mirilla rifle" width="50" height="50"
                        decoding="async">
                </div>
            </div>

            <div id="buttonShoot" class="button">

                ✋

            </div>

            <div id="Right1" class="button">

                🤚
            </div>
            <div id="Right2" class="button">
                Jump
            </div>
            <div id="Right3" class="button">

                &#8801;

            </div>

        </div>

    </div>

    <div id="sceneView">
        <div id="crossHair">+</div>
    </div>

    <script src="/assets/scripts/supabase.js"></script>
    <script src="accountSessionShared.js"></script>
    <script type="module">
        import { guardKolorlandoAccountSessionOrRedirect } from "./accountSessionGuard.js";
        import { renderKolorlandoMenuPanel } from "./code/UI/menuPanelMarkup.js";
        import { createMultiplayerWorldStore } from "./code/data/worldMultiplayerSaving.js";

        const canEnterKolorlandoPage = await guardKolorlandoAccountSessionOrRedirect();

        if (!canEnterKolorlandoPage) {
            throw new Error("Kolorlando multiplayer entry blocked by another active session.");
        }

        window.KOLORLANDO_MULTIPLAYER_WORLD_STORE = await createMultiplayerWorldStore({
            worldId: "voxelandia",
        });
        window.KOLORLANDO_MULTIPLAYER_WORLD_STATE = window.KOLORLANDO_MULTIPLAYER_WORLD_STORE.getCurrentState();

        renderKolorlandoMenuPanel(document.getElementById("menuCentralMount"));
        await import("./script.js");
    </script>
</body>

</html>
