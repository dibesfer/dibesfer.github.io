<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandalaar</title>
    <style>

        * {
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            background: #1f6e2a;
            font-family: sans-serif;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 2;
            padding: 1rem;
            pointer-events: none;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
        }

        #overlayTitleRow {
            display: flex;
            align-items: baseline;
            gap: 0.6rem;
        }

        #overlay h1,
        #overlay h3 {
            margin: 0;
        }

        #fpsCounter {
            font-family: monospace;
            font-size: 0.95rem;
            font-weight: 700;
            opacity: 0.9;
        }

        #overlay h3 {
            margin-top: 0.35rem;
            opacity: 0.85;
            font-weight: 600;
        }

        #playerHud {
            position: fixed;
            left: 50%;
            bottom: 12px;
            transform: translateX(-50%);
            width: min(520px, calc(100vw - 20px));
            z-index: 3;
            pointer-events: none;
        }

        #playerHudReadout {
            margin-bottom: 6px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffebeb;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
        }

        #playerHealthBar {
            position: relative;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 999px;
            background: rgba(35, 35, 35, 0.8);
            overflow: hidden;
        }

        #playerHealthFill {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 100%;
            background: linear-gradient(90deg, #1ca646 0%, #62d84a 100%);
            transition: width 0.1s linear, background 0.1s linear;
        }

        #playerHealthText {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }

        #hotbar {
            display: grid;
            grid-template-columns: repeat(8, minmax(0, 1fr));
            gap: 6px;
            margin-top: 8px;
            padding: 8px;
            border: 2px solid rgba(255, 255, 255, 0.72);
            background: rgba(10, 12, 16, 0.6);
            border-radius: 10px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
            pointer-events: auto;
        }

        .hotbar-slot {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        .hotbar-slot.is-selected {
            border-color: #fef8bc;
            box-shadow: 0 0 0 2px rgba(255, 238, 128, 0.35);
            background: rgba(255, 248, 188, 0.18);
        }

        .hotbar-slot-label,
        .hotbar-slot-icon,
        .hotbar-slot-count {
            position: absolute;
            color: #ffffff;
            font-weight: 700;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
        }

        .hotbar-slot-label {
            top: 4px;
            left: 6px;
            font-size: 0.75rem;
        }

        .hotbar-slot-icon {
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .hotbar-slot-count {
            right: 6px;
            bottom: 4px;
            font-size: 0.75rem;
        }

        .joystick {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.4);
            background: rgba(9, 13, 18, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            user-select: none;
        }

        .joystick .pad {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.55);
            background: rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 1.7rem;
            font-weight: 700;
            pointer-events: none;
        }

        #menuInferior {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 5;
            display: none;
            justify-content: space-between;
            align-items: end;
            pointer-events: none;
        }

        #menuInferior.is-visible {
            display: flex;
        }

        #menuInferiorLeft,
        #menuInferiorRight {
            position: relative;
            flex: 1 1 50%;
            height: 100%;
            touch-action: none;
            pointer-events: auto;
        }

        #menuInferiorLeft>.joystick,
        #menuInferiorRight>.joystick {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .mobile-button {
            position: absolute;
            z-index: 2;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.55);
            background: rgba(20, 24, 30, 0.38);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font: inherit;
            font-weight: 700;
            touch-action: none;
            user-select: none;
            pointer-events: auto;
            padding: 0;
        }

        .mobile-button.is-active {
            background: rgba(210, 170, 30, 0.78);
        }

        .mobile-button.is-shooting {
            background: rgba(210, 30, 30, 0.82);
        }

        #Left2 {
            left: 5px;
            bottom: 5px;
        }

        #buttonUp {
            right: 5px;
            bottom: 5px;
        }

        #Left0 {
            left: 5px;
            top: 5px;
        }

        #Left1 {
            right: 5px;
            top: 5px;
        }

        #buttonShoot {
            left: 5px;
            top: 5px;
        }

        #Right1 {
            top: 5px;
            right: 5px;
        }

        #Right2 {
            bottom: 5px;
            left: 5px;
        }

        #Right3 {
            bottom: 5px;
            right: 5px;
        }

        @media (max-width: 700px) {
            #playerHud {
                bottom: 10px;
                width: calc(100vw - 16px);
            }

            #overlay {
                padding: 0.8rem;
            }

            #overlay h1 {
                font-size: 1.4rem;
            }

            #overlay h3 {
                font-size: 0.95rem;
            }
        }

        body[data-mode="desktop"] #menuInferior {
            display: none !important;
        }

        body[data-mode="mobile-portrait"] {
            height: 100dvh;
            overflow: hidden;
        }

        body[data-mode="mobile-portrait"] #playerHud {
            bottom: 22%;
        }

        body[data-mode="mobile-portrait"] #menuInferior {
            left: 0;
            bottom: 0;
            width: 100%;
            height: 20dvh;
        }

        body[data-mode="mobile-portrait"] #menuInferiorLeft {
            background-color: rgba(255, 0, 0, 0.22);
        }

        body[data-mode="mobile-portrait"] #menuInferiorRight {
            background-color: rgba(0, 96, 0, 0.24);
        }

        body[data-mode="mobile-landscape"] {
            height: var(--app-height, 100vh);
        }

        body[data-mode="mobile-landscape"] #menuInferior {
            top: 0;
            bottom: 0;
            height: 100%;
            background-color: unset;
            backdrop-filter: unset;
        }

        body[data-mode="mobile-landscape"] #menuInferiorLeft {
            background-color: rgba(255, 0, 0, 0.22);
            border-top-right-radius: 50%;
            height: 50%;
            flex: 0 0 25%;
            max-width: 25%;
        }

        body[data-mode="mobile-landscape"] #menuInferiorRight {
            background-color: rgba(0, 96, 0, 0.24);
            border-top-left-radius: 50%;
            height: 50%;
            flex: 0 0 25%;
            max-width: 25%;
        }

        body[data-mode="mobile-landscape"] #playerHud {
            width: 50%;
        }

        canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="overlay">
        <div id="overlayTitleRow">
            <h1>Mandalaar</h1>
            <span id="fpsCounter">0 FPS</span>
        </div>
        <h3>Topdown 2D game</h3>
    </div>
    <div id="playerHud" aria-label="Player HUD">
        <div id="playerHudReadout">Coins: 0 | Food: 40 | Enemies: 15 | Deaths: 0</div>
        <div id="playerHealthBar" aria-label="Player health">
            <div id="playerHealthFill"></div>
            <span id="playerHealthText">100 / 100</span>
        </div>
        <div id="hotbar" aria-label="Hotbar">
            <div class="hotbar-slot is-selected">
                <span class="hotbar-slot-label">1</span>
                <span class="hotbar-slot-icon">+</span>
                <span class="hotbar-slot-count">HP</span>
            </div>
            <div class="hotbar-slot">
                <span class="hotbar-slot-label">2</span>
                <span class="hotbar-slot-icon">o</span>
                <span class="hotbar-slot-count">1</span>
            </div>
            <div class="hotbar-slot">
                <span class="hotbar-slot-label">3</span>
                <span class="hotbar-slot-icon">*</span>
                <span class="hotbar-slot-count">Q</span>
            </div>
            <div class="hotbar-slot">
                <span class="hotbar-slot-label">4</span>
                <span class="hotbar-slot-icon">W</span>
                <span class="hotbar-slot-count">MV</span>
            </div>
            <div class="hotbar-slot">
                <span class="hotbar-slot-label">5</span>
                <span class="hotbar-slot-icon">A</span>
                <span class="hotbar-slot-count">IM</span>
            </div>
            <div class="hotbar-slot">
                <span class="hotbar-slot-label">6</span>
                <span class="hotbar-slot-icon">S</span>
                <span class="hotbar-slot-count">FD</span>
            </div>
            <div class="hotbar-slot">
                <span class="hotbar-slot-label">7</span>
                <span class="hotbar-slot-icon">$</span>
                <span class="hotbar-slot-count">C</span>
            </div>
            <div class="hotbar-slot">
                <span class="hotbar-slot-label">8</span>
                <span class="hotbar-slot-icon">!</span>
                <span class="hotbar-slot-count">EN</span>
            </div>
        </div>
    </div>
    <div id="menuInferior" hidden>
        <div id="menuInferiorLeft">
            <div class="joystick" data-joystick="left">
                <div class="pad">M</div>
            </div>
            <button id="Left2" class="mobile-button" type="button">D</button>
            <button id="buttonUp" class="mobile-button" type="button">U</button>
            <button id="Left0" class="mobile-button" type="button">L0</button>
            <button id="Left1" class="mobile-button" type="button">L1</button>
        </div>
        <div id="menuInferiorRight">
            <div class="joystick" data-joystick="right">
                <div class="pad">A</div>
            </div>
            <button id="buttonShoot" class="mobile-button" type="button">S</button>
            <button id="Right1" class="mobile-button" type="button">R1</button>
            <button id="Right2" class="mobile-button" type="button">R2</button>
            <button id="Right3" class="mobile-button" type="button">R3</button>
        </div>
    </div>
    <canvas id="gameCanvas" aria-label="Mandalaar game view"></canvas>
    <script>

/*

lets add a hunger system, an orange progressbar below healthbar,

every 5 seconds we lose 1 point, every food increases 5 points.

if we are over 5
*/

        const canvas = document.getElementById('gameCanvas');
        const context = canvas.getContext('2d');
        const bodyElement = document.body;
        const fpsCounter = document.getElementById('fpsCounter');
        const playerHudReadout = document.getElementById('playerHudReadout');
        const playerHealthFill = document.getElementById('playerHealthFill');
        const playerHealthText = document.getElementById('playerHealthText');
        const menuInferior = document.getElementById('menuInferior');
        const leftJoystickElement = document.querySelector('#menuInferiorLeft .joystick');
        const rightJoystickElement = document.querySelector('#menuInferiorRight .joystick');
        const MAP_SIZE = 2000;
        const MAP_HALF_SIZE = MAP_SIZE * 0.5;
        const MAP_BORDER_THICKNESS = 20;
        const FOOD_COUNT = 40;
        const COIN_COUNT = 28;
        const MELEE_ENEMY_COUNT = 40;
        const RANGED_ENEMY_COUNT = 10;
        const BOSS_ENEMY_COUNT = 3;
        const PLAYER_RADIUS = 14;
        const PLAYER_SPEED = 240;
        const PLAYER_SPRINT_MULTIPLIER = 1.7;
        const PLAYER_MAX_HEALTH = 100;
        const PLAYER_PROJECTILE_DAMAGE = 20;
        const PLAYER_PROJECTILE_RADIUS = 5;
        const PLAYER_PROJECTILE_LIFE = 1.4;
        const ALLY_RADIUS = 12;
        const ALLY_SPEED = 235;
        const ALLY_STANDOFF_DISTANCE = 100;
        const ALLY_STANDOFF_TOLERANCE = 0;
        const ALLY_AREA_RADIUS = 100;
        const ALLY_ATTACK_DAMAGE = 20;
        const ALLY_ATTACK_INTERVAL = 0.9;
        const ALLY_ATTACK_RANGE = 30;
        const PACIFIST_COUNT = 12;
        const PACIFIST_RADIUS = 11;
        const PACIFIST_SPEED = 90;
        const PACIFIST_MAX_HEALTH = 100;
        const ENEMY_RADIUS = 12;
        const ENEMY_MAX_HEALTH = 100;
        const ENEMY_PROJECTILE_RADIUS = 4;
        const ENEMY_PROJECTILE_LIFE = 2.1;
        const BOSS_RADIUS_MULTIPLIER = 5;
        const BOSS_MELEE_DAMAGE = 20;
        const BLUE_AREA_RADIUS_MULTIPLIER = 5;
        const COLLECTIBLE_ATTRACTION_SPEED = 7000;
        const COLLECTIBLE_MAGNET_MAX_STRENGTH = 7000;
        const COLLECTIBLE_MAGNET_DRAG = 5;
        const groundPatches = [];
        const foodDots = [];
        const coinDots = [];
        const enemyDots = [];
        const pacifistDots = [];
        const outerStars = [];
        const projectiles = [];
        const enemyProjectiles = [];
        const pressedKeys = {};
        const bossSymbolImage = new Image();
        bossSymbolImage.src = '/assets/art/symbols/Chaos_star.svg';
        const player = {
            x: 0,
            y: 0,
            radius: PLAYER_RADIUS,
            speed: PLAYER_SPEED,
            maxHealth: PLAYER_MAX_HEALTH,
            health: PLAYER_MAX_HEALTH,
            coins: 0,
            deaths: 0,
            hitFlash: 0,
        };
        const ally = {
            x: ALLY_STANDOFF_DISTANCE,
            y: 0,
            radius: ALLY_RADIUS,
            speed: ALLY_SPEED,
            attackCooldown: 0,
        };
        const cursor = {
            x: window.innerWidth * 0.5,
            y: window.innerHeight * 0.5,
            radius: 8,
            visible: false,
        };
        const mobileModeQuery = window.matchMedia('(hover: none) and (pointer: coarse)');
        const mobileButtons = Array.from(document.querySelectorAll('.mobile-button'));
        const mobileControlState = {
            leftJoystick: { active: false, touchId: null, x: 0, y: 0, strength: 0 },
            rightJoystick: { active: false, touchId: null, x: 0, y: 0, strength: 0 },
            buttons: {
                Left0: false,
                Left1: false,
                Left2: false,
                buttonUp: false,
                buttonShoot: false,
                Right1: false,
                Right2: false,
                Right3: false,
            },
        };
        let lastFrameTime = 0;
        let displayedFps = 0;

        function isMobileMode() {
            return bodyElement.dataset.mode === 'mobile-portrait' || bodyElement.dataset.mode === 'mobile-landscape';
        }

        function updateAppMode() {
            /* Desktop and the two mobile orientations share one mode source so
            the layout, touch UI, and future input wiring stay in sync. */
            const isMobile = mobileModeQuery.matches;
            let nextMode = 'desktop';

            if (isMobile) {
                nextMode = window.innerHeight >= window.innerWidth ? 'mobile-portrait' : 'mobile-landscape';
            }

            bodyElement.dataset.mode = nextMode;

            /* The Kolorlando-style lower control shell only appears in mobile
            modes, while desktop keeps the canvas and HUD unobstructed. */
            if (isMobile) {
                menuInferior.hidden = false;
                menuInferior.classList.add('is-visible');
            } else {
                menuInferior.hidden = true;
                menuInferior.classList.remove('is-visible');
            }
        }

        function resetJoystickState(state) {
            state.active = false;
            state.touchId = null;
            state.x = 0;
            state.y = 0;
            state.strength = 0;
        }

        function bindVirtualJoystick(element, state) {
            /* The joystick stores normalized placeholder values now so you can
            later decide exactly how movement and aiming should consume them. */
            const padElement = element.querySelector('.pad');

            function updateJoystickPad() {
                if (!padElement) return;
                /* Travel is computed from the live element sizes so the pad
                stays just inside the outer ring even if box sizing changes. */
                const padTravel = Math.max(0, (element.clientWidth - padElement.clientWidth) * 0.5 - 1);
                padElement.style.transform = `translate(${state.x * padTravel}px, ${state.y * padTravel}px)`;
            }

            element.addEventListener('touchstart', event => {
                if (state.active) return;
                const touch = event.changedTouches[0];
                if (!touch) return;
                state.active = true;
                state.touchId = touch.identifier;
                updateJoystickPad();
                event.preventDefault();
            }, { passive: false });

            element.addEventListener('touchmove', event => {
                if (!state.active) return;
                for (let i = 0; i < event.changedTouches.length; i += 1) {
                    const touch = event.changedTouches[i];
                    if (touch.identifier !== state.touchId) continue;

                    const rect = element.getBoundingClientRect();
                    const centerX = rect.left + rect.width * 0.5;
                    const centerY = rect.top + rect.height * 0.5;
                    const dx = touch.clientX - centerX;
                    const dy = touch.clientY - centerY;
                    const radius = rect.width * 0.5;
                    const distance = Math.hypot(dx, dy);
                    const clampedDistance = Math.min(radius, distance);
                    const safeDistance = distance || 1;

                    state.x = dx / safeDistance * (clampedDistance / radius);
                    state.y = dy / safeDistance * (clampedDistance / radius);
                    state.strength = clampedDistance / radius;
                    updateJoystickPad();
                    event.preventDefault();
                    break;
                }
            }, { passive: false });

            const releaseJoystick = event => {
                if (!state.active) return;
                for (let i = 0; i < event.changedTouches.length; i += 1) {
                    const touch = event.changedTouches[i];
                    if (touch.identifier !== state.touchId) continue;
                    resetJoystickState(state);
                    updateJoystickPad();
                    event.preventDefault();
                    break;
                }
            };

            element.addEventListener('touchend', releaseJoystick, { passive: false });
            element.addEventListener('touchcancel', releaseJoystick, { passive: false });
        }

        function setMobileButtonState(buttonId, active) {
            mobileControlState.buttons[buttonId] = active;
            const element = document.getElementById(buttonId);
            if (!element) return;
            element.classList.toggle('is-active', active);
            if (buttonId === 'buttonShoot') {
                element.classList.toggle('is-shooting', active);
            }
        }

        function bindMobileButton(buttonId) {
            const element = document.getElementById(buttonId);
            if (!element) return;

            const activate = event => {
                setMobileButtonState(buttonId, true);
                event.preventDefault();
            };

            const deactivate = event => {
                setMobileButtonState(buttonId, false);
                event.preventDefault();
            };

            element.addEventListener('touchstart', activate, { passive: false });
            element.addEventListener('touchend', deactivate, { passive: false });
            element.addEventListener('touchcancel', deactivate, { passive: false });
        }

        function updateFpsCounter(deltaTime) {
            /* The title-adjacent readout uses a lightly smoothed FPS value so
            it stays readable instead of jittering wildly every single frame. */
            if (deltaTime <= 0) return;

            const instantFps = 1 / deltaTime;
            displayedFps += (instantFps - displayedFps) * 0.15;
            fpsCounter.textContent = `${Math.round(displayedFps)} FPS`;
        }

        function updatePlayerHud() {
            /* The HUD mirrors the lightweight survival state already present in
            the prototype so health loss, pickups, and remaining threats are
            readable without opening menus or stopping movement. */
            const clampedHealth = Math.max(0, Math.min(player.maxHealth, player.health));
            const healthPercent = (clampedHealth / player.maxHealth) * 100;

            playerHealthFill.style.width = `${healthPercent}%`;
            playerHealthText.textContent = `${Math.ceil(clampedHealth)} / ${player.maxHealth}`;

            /* The bar color shifts as health drops so danger reads instantly
            even when the player only catches the HUD in peripheral vision. */
            if (healthPercent > 60) {
                playerHealthFill.style.background = 'linear-gradient(90deg, #1ca646 0%, #62d84a 100%)';
            } else if (healthPercent > 30) {
                playerHealthFill.style.background = 'linear-gradient(90deg, #d68b21 0%, #f2c94c 100%)';
            } else {
                playerHealthFill.style.background = 'linear-gradient(90deg, #a61c1c 0%, #e04f4f 100%)';
            }

            playerHudReadout.textContent = `Coins: ${player.coins} | Food: ${foodDots.length} | Enemies: ${enemyDots.length} | Deaths: ${player.deaths}`;
        }

        function respawnPlayer() {
            /* Respawning resets only the player's local combat state so death
            feels immediate and readable without wiping the whole current run. */
            player.x = 0;
            player.y = 0;
            player.health = player.maxHealth;
            player.hitFlash = 0;

            /* Clearing active bullets prevents the player from respawning into
            the same unavoidable projectile cluster on the next frame. */
            enemyProjectiles.length = 0;
            projectiles.length = 0;
            ally.x = ALLY_STANDOFF_DISTANCE;
            ally.y = 0;
            ally.attackCooldown = 0;
        }

        function updatePlayerDeath() {
            /* Death resolves before rendering the next frame so the HUD never
            sits at zero health for long and the respawn loop stays snappy. */
            if (player.health > 0) return;

            player.deaths += 1;
            respawnPlayer();
        }

        function randomMapCoordinate(margin = 0) {
            /* World content is generated inside the finite playfield so the
            border reads as a real limit instead of decorative paint. */
            const usableHalfSize = Math.max(0, MAP_HALF_SIZE - margin);
            return (Math.random() * 2 - 1) * usableHalfSize;
        }

        function createGroundPatches() {
            /* Prebuilding the ground patches once per resize keeps the map
            visually varied while avoiding a distracting terrain flicker every
            time the frame redraws. */
            groundPatches.length = 0;

            const patchCount = Math.max(24, Math.floor((canvas.width * canvas.height) / 28000));
            for (let i = 0; i < patchCount; i += 1) {
                const segments = [];
                const segmentCount = 3 + Math.floor(Math.random() * 4);
                for (let segmentIndex = 0; segmentIndex < segmentCount; segmentIndex += 1) {
                    segments.push({
                        offsetX: (Math.random() - 0.5) * 22,
                        offsetY: (Math.random() - 0.5) * 22,
                        widthScale: 0.55 + Math.random() * 0.6,
                        heightScale: 0.55 + Math.random() * 0.6,
                    });
                }

                groundPatches.push({
                    x: randomMapCoordinate(MAP_BORDER_THICKNESS + 90),
                    y: randomMapCoordinate(MAP_BORDER_THICKNESS + 90),
                    width: 50 + Math.random() * 140,
                    height: 50 + Math.random() * 140,
                    segments,
                });
            }
        }

        function createOuterStars() {
            /* The outer void gets its own distant star field so leaving the
            playable map still feels intentional instead of visually empty. */
            outerStars.length = 0;

            const starFieldSize = MAP_SIZE * 2;
            /* Star count scales with the generated outer-space area so the
            black void keeps a readable density even if the star field grows. */
            const starFieldArea = starFieldSize * starFieldSize;
            const starDensity = 1 / 42000;
            const starCount = Math.max(140, Math.floor(starFieldArea * starDensity));
            for (let i = 0; i < starCount; i += 1) {
                outerStars.push({
                    x: (Math.random() - 0.5) * starFieldSize,
                    y: (Math.random() - 0.5) * starFieldSize,
                    radius: 1 + Math.random() * 2,
                });
            }
        }

        function createFoodDots() {
            /* Food is scattered in world space so it behaves like a pickup field
            the player can traverse, instead of a UI decoration pinned to the
            current viewport. */
            foodDots.length = 0;

            for (let i = 0; i < FOOD_COUNT; i += 1) {
                foodDots.push({
                    x: randomMapCoordinate(MAP_BORDER_THICKNESS + 24),
                    y: randomMapCoordinate(MAP_BORDER_THICKNESS + 24),
                    radius: 7 + Math.random() * 3,
                    velocityX: 0,
                    velocityY: 0,
                    magnetStrength: 0,
                });
            }
        }

        function createCoinDots() {
            /* Coins share the same simple pickup loop as food so we can add
            collectible economy beats now and score logic later. */
            coinDots.length = 0;

            for (let i = 0; i < COIN_COUNT; i += 1) {
                coinDots.push({
                    x: randomMapCoordinate(MAP_BORDER_THICKNESS + 24),
                    y: randomMapCoordinate(MAP_BORDER_THICKNESS + 24),
                    radius: 4 + Math.random() * 2,
                    velocityX: 0,
                    velocityY: 0,
                    magnetStrength: 0,
                });
            }
        }

        function createEnemyDots() {
            /* Enemies live in world space just like food, which keeps their AI,
            collision, and future combat logic independent from the camera. */
            enemyDots.length = 0;

            function createEnemyBase(overrides = {}) {
                /* Both melee and ranged enemies share the same movement shell so
                the dark red variant can inherit the red one's wander/chase loop
                and only override the combat distances it cares about. */
                return {
                    x: randomMapCoordinate(MAP_BORDER_THICKNESS + 40),
                    y: randomMapCoordinate(MAP_BORDER_THICKNESS + 40),
                    radius: ENEMY_RADIUS,
                    maxHealth: ENEMY_MAX_HEALTH,
                    health: ENEMY_MAX_HEALTH,
                    speed: 105 + Math.random() * 25,
                    wanderAngle: Math.random() * Math.PI * 2,
                    wanderTimer: 0.4 + Math.random() * 1.6,
                    hitFlash: 0,
                    chasing: false,
                    detectionDistance: 150,
                    disengageDistance: 200,
                    stopDistance: 40,
                    color: '#d82f2f',
                    projectileCooldown: 0,
                    projectileInterval: 1.3,
                    touchDamage: 10,
                    meleeAttackCooldown: 0,
                    meleeAttackInterval: 1,
                    isBoss: false,
                    shoots: false,
                    ...overrides,
                };
            }

            for (let i = 0; i < MELEE_ENEMY_COUNT; i += 1) {
                enemyDots.push(createEnemyBase());
            }

            for (let i = 0; i < RANGED_ENEMY_COUNT; i += 1) {
                enemyDots.push(createEnemyBase({
                    speed: 92 + Math.random() * 18,
                    detectionDistance: 190,
                    disengageDistance: 250,
                    stopDistance: 160,
                    color: '#7a1414',
                    projectileInterval: 1.0 + Math.random() * 0.35,
                    touchDamage: 0,
                    shoots: true,
                }));
            }

            for (let i = 0; i < BOSS_ENEMY_COUNT; i += 1) {
                enemyDots.push(createEnemyBase({
                    radius: ENEMY_RADIUS * BOSS_RADIUS_MULTIPLIER,
                    speed: 64 + Math.random() * 12,
                    detectionDistance: 260,
                    disengageDistance: 320,
                    stopDistance: 70,
                    color: '#4a0000',
                    touchDamage: BOSS_MELEE_DAMAGE,
                    projectileInterval: 1.8,
                    isBoss: true,
                    shoots: false,
                }));
            }
        }

        function createPacifistDots() {
            /* Pacifists are simple ambient walkers that add life to the map
            without adding another combat role to the prototype. */
            pacifistDots.length = 0;

            for (let i = 0; i < PACIFIST_COUNT; i += 1) {
                pacifistDots.push({
                    x: randomMapCoordinate(MAP_BORDER_THICKNESS + 40),
                    y: randomMapCoordinate(MAP_BORDER_THICKNESS + 40),
                    radius: PACIFIST_RADIUS,
                    health: PACIFIST_MAX_HEALTH,
                    speed: PACIFIST_SPEED + Math.random() * 18,
                    wanderAngle: Math.random() * Math.PI * 2,
                    wanderTimer: 0.35 + Math.random() * 1.8,
                    hitFlash: 0,
                });
            }
        }

        function resizeCanvas() {
            /* The game canvas follows the viewport exactly so we can treat the
            full browser window as the playable screen from the very start. */
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initializeWorld() {
            /* World generation stays separate from viewport resizing so the map,
            pickups, and enemies remain stable when the browser window changes. */
            createOuterStars();
            createGroundPatches();
            createFoodDots();
            createCoinDots();
            createEnemyDots();
            createPacifistDots();
        }

        function drawFloor() {
            /* The world is finite, so we first paint the void outside the map
            and then lay down the playable grass base before other layers. */
            context.fillStyle = '#050505';
            context.fillRect(0, 0, canvas.width, canvas.height);

            const cameraX = player.x;
            const cameraY = player.y;
            const viewCenterX = canvas.width * 0.5;
            const viewCenterY = canvas.height * 0.5;

            context.fillStyle = '#f4f6fb';
            for (let i = 0; i < outerStars.length; i += 1) {
                const star = outerStars[i];
                const drawX = viewCenterX + (star.x - cameraX);
                const drawY = viewCenterY + (star.y - cameraY);

                context.beginPath();
                context.arc(drawX, drawY, star.radius, 0, Math.PI * 2);
                context.fill();
            }

            const mapScreenX = viewCenterX + (-MAP_HALF_SIZE - cameraX);
            const mapScreenY = viewCenterY + (-MAP_HALF_SIZE - cameraY);

            context.fillStyle = '#2f8f3a';
            context.fillRect(
                mapScreenX,
                mapScreenY,
                MAP_SIZE,
                MAP_SIZE
            );
        }

        function drawMapBorders() {
            /* Borders render after terrain details so the red blocking edge
            stays crisp and always readable against the darker ground patches. */
            const cameraX = player.x;
            const cameraY = player.y;
            const viewCenterX = canvas.width * 0.5;
            const viewCenterY = canvas.height * 0.5;
            const mapScreenX = viewCenterX + (-MAP_HALF_SIZE - cameraX);
            const mapScreenY = viewCenterY + (-MAP_HALF_SIZE - cameraY);

            context.fillStyle = '#c42323';
            context.fillRect(mapScreenX, mapScreenY, MAP_SIZE, MAP_BORDER_THICKNESS);
            context.fillRect(mapScreenX, mapScreenY + MAP_SIZE - MAP_BORDER_THICKNESS, MAP_SIZE, MAP_BORDER_THICKNESS);
            context.fillRect(mapScreenX, mapScreenY, MAP_BORDER_THICKNESS, MAP_SIZE);
            context.fillRect(mapScreenX + MAP_SIZE - MAP_BORDER_THICKNESS, mapScreenY, MAP_BORDER_THICKNESS, MAP_SIZE);
        }

        function drawGroundPatches() {
            /* Layering a few chunky rectangles per patch makes the terrain feel
            rougher and more organic than a perfectly flat single-color field. */
            context.fillStyle = '#256b2b';
            const cameraX = player.x;
            const cameraY = player.y;
            const viewCenterX = canvas.width * 0.5;
            const viewCenterY = canvas.height * 0.5;

            for (let i = 0; i < groundPatches.length; i += 1) {
                const patch = groundPatches[i];
                for (let segment = 0; segment < patch.segments.length; segment += 1) {
                    const part = patch.segments[segment];
                    const width = patch.width * part.widthScale;
                    const height = patch.height * part.heightScale;
                    context.fillRect(
                        viewCenterX + (patch.x - cameraX) + part.offsetX - width * 0.5,
                        viewCenterY + (patch.y - cameraY) + part.offsetY - height * 0.5,
                        width,
                        height
                    );
                }
            }
        }

        function drawOutlinedDot(drawX, drawY, radius, fillColor) {
            /* All circular gameplay entities share the same black ring so dots
            stay readable against grass, borders, and outer space alike. */
            context.fillStyle = fillColor;
            context.strokeStyle = '#000000';
            context.lineWidth = 2;
            context.beginPath();
            context.arc(drawX, drawY, radius, 0, Math.PI * 2);
            context.fill();
            context.stroke();
        }

        function drawFoodDots() {
            /* The food uses the same camera offset as the terrain so pickups
            stay anchored in the world and naturally scroll past the player. */
            const cameraX = player.x;
            const cameraY = player.y;
            const viewCenterX = canvas.width * 0.5;
            const viewCenterY = canvas.height * 0.5;

            for (let i = 0; i < foodDots.length; i += 1) {
                const food = foodDots[i];
                const drawX = viewCenterX + (food.x - cameraX);
                const drawY = viewCenterY + (food.y - cameraY);

                drawOutlinedDot(drawX, drawY, food.radius, '#7a4a1e');
            }
        }

        function drawCoinDots() {
            /* Coins stay in the world like food pickups, but a brighter gold
            color keeps them instantly distinguishable from survival resources. */
            const cameraX = player.x;
            const cameraY = player.y;
            const viewCenterX = canvas.width * 0.5;
            const viewCenterY = canvas.height * 0.5;

            for (let i = 0; i < coinDots.length; i += 1) {
                const coin = coinDots[i];
                const drawX = viewCenterX + (coin.x - cameraX);
                const drawY = viewCenterY + (coin.y - cameraY);

                drawOutlinedDot(drawX, drawY, coin.radius, '#ffd84d');
            }
        }

        function drawEnemyDots() {
            /* Red enemies are rendered in the same camera space as the rest of
            the world so their movement reads as true map navigation. */
            const cameraX = player.x;
            const cameraY = player.y;
            const viewCenterX = canvas.width * 0.5;
            const viewCenterY = canvas.height * 0.5;

            for (let i = 0; i < enemyDots.length; i += 1) {
                const enemy = enemyDots[i];
                const drawX = viewCenterX + (enemy.x - cameraX);
                const drawY = viewCenterY + (enemy.y - cameraY);

                drawOutlinedDot(drawX, drawY, enemy.radius, enemy.hitFlash > 0 ? '#7ab0ff' : enemy.color);

                /* Bosses keep their colored body and get the chaos symbol
                centered over it so the marker stays crisp at any scale. */
                if (enemy.isBoss && bossSymbolImage.complete) {
                    const symbolSize = enemy.radius * 1.55;
                    context.drawImage(
                        bossSymbolImage,
                        drawX - symbolSize * 0.5,
                        drawY - symbolSize * 0.5,
                        symbolSize,
                        symbolSize
                    );
                }
            }
        }

        function drawPacifistDots() {
            /* Pacifists share the same world-space camera transform so they
            feel like inhabitants of the same map rather than UI pieces. */
            const cameraX = player.x;
            const cameraY = player.y;
            const viewCenterX = canvas.width * 0.5;
            const viewCenterY = canvas.height * 0.5;

            for (let i = 0; i < pacifistDots.length; i += 1) {
                const pacifist = pacifistDots[i];
                const drawX = viewCenterX + (pacifist.x - cameraX);
                const drawY = viewCenterY + (pacifist.y - cameraY);

                drawOutlinedDot(drawX, drawY, pacifist.radius, pacifist.hitFlash > 0 ? '#7ab0ff' : 'lightgreen');
            }
        }

        function drawProjectiles() {
            /* Projectiles live in world space like enemies, so aiming and hits
            stay consistent even while the camera remains centered on the player. */
            const cameraX = player.x;
            const cameraY = player.y;
            const viewCenterX = canvas.width * 0.5;
            const viewCenterY = canvas.height * 0.5;

            for (let i = 0; i < projectiles.length; i += 1) {
                const projectile = projectiles[i];
                const drawX = viewCenterX + (projectile.x - cameraX);
                const drawY = viewCenterY + (projectile.y - cameraY);

                drawOutlinedDot(drawX, drawY, projectile.radius, '#101010');
            }
        }

        function drawEnemyProjectiles() {
            /* Enemy bullets use a separate visual so ranged threats read
            differently from the player's own shots at a glance. */
            const cameraX = player.x;
            const cameraY = player.y;
            const viewCenterX = canvas.width * 0.5;
            const viewCenterY = canvas.height * 0.5;

            for (let i = 0; i < enemyProjectiles.length; i += 1) {
                const projectile = enemyProjectiles[i];
                const drawX = viewCenterX + (projectile.x - cameraX);
                const drawY = viewCenterY + (projectile.y - cameraY);

                drawOutlinedDot(drawX, drawY, projectile.radius, '#4f0e0e');
            }
        }

        function drawAllyArea() {
            /* The ally area shows the protection radius that can trigger its
            defensive behavior without obscuring the entities inside it. */
            const viewCenterX = canvas.width * 0.5;
            const viewCenterY = canvas.height * 0.5;
            const drawX = viewCenterX + (ally.x - player.x);
            const drawY = viewCenterY + (ally.y - player.y);

            context.fillStyle = 'rgba(95, 158, 160, 0.18)';
            context.beginPath();
            context.arc(drawX, drawY, ALLY_AREA_RADIUS, 0, Math.PI * 2);
            context.fill();
        }

        function drawBlueArea() {
            /* The blueArea is painted before gameplay entities so it reads as
            ground feedback instead of covering actors that pass over it. */
            const centerX = canvas.width * 0.5;
            const centerY = canvas.height * 0.5;

            context.fillStyle = 'rgba(31, 109, 255, 0.4)';
            context.beginPath();
            context.arc(centerX, centerY, player.radius * BLUE_AREA_RADIUS_MULTIPLIER, 0, Math.PI * 2);
            context.fill();
        }

        function getBlueAreaRadius() {
            /* Centralizing the area radius keeps the render circle and the
            gameplay magnet zone perfectly aligned when tuned later. */
            return player.radius * BLUE_AREA_RADIUS_MULTIPLIER;
        }

        function drawPlayer() {
            /* The player starts centered on screen so the camera and character
            occupy the same reference point while the prototype stays minimal. */
            const centerX = canvas.width * 0.5;
            const centerY = canvas.height * 0.5;

            drawOutlinedDot(centerX, centerY, player.radius, player.hitFlash > 0 ? '#7ab0ff' : '#1f6dff');
        }

        function drawAlly() {
            /* The ally uses the same world-space camera offset as enemies so
            following and combat read as real movement on the map. */
            const viewCenterX = canvas.width * 0.5;
            const viewCenterY = canvas.height * 0.5;
            const drawX = viewCenterX + (ally.x - player.x);
            const drawY = viewCenterY + (ally.y - player.y);

            drawOutlinedDot(drawX, drawY, ally.radius, 'cadetblue');
        }

        function drawAimLine() {
            /* Starting the line slightly below the player keeps the character
            readable while still making the cursor direction obvious at a glance. */
            if (!cursor.visible) return;

            const startX = canvas.width * 0.5;
            const startY = canvas.height * 0.5;

            context.strokeStyle = '#f8e36a';
            context.lineWidth = 3;
            context.lineCap = 'round';
            context.beginPath();
            context.moveTo(startX, startY);
            context.lineTo(cursor.x, cursor.y);
            context.stroke();
        }

        function drawCursor() {
            /* Keeping the cursor as an in-world paint layer makes aiming and
            future interaction logic easy to extend without relying on CSS UI. */
            if (!cursor.visible) return;

            drawOutlinedDot(cursor.x, cursor.y, cursor.radius, '#ffe45c');
        }

        function updatePlayer(deltaTime) {
            /* Normalizing the input vector prevents diagonal travel from moving
            faster than straight-line movement when two keys are held at once. */
            let moveX = 0;
            let moveY = 0;

            if (isMobileMode()) {
                /* Mobile movement reads directly from the left virtual joystick,
                leaving the exact right-side touch actions free for later wiring. */
                moveX = mobileControlState.leftJoystick.x;
                moveY = mobileControlState.leftJoystick.y;
            } else {
                if (pressedKeys.KeyA || pressedKeys.ArrowLeft) moveX -= 1;
                if (pressedKeys.KeyD || pressedKeys.ArrowRight) moveX += 1;
                if (pressedKeys.KeyW || pressedKeys.ArrowUp) moveY -= 1;
                if (pressedKeys.KeyS || pressedKeys.ArrowDown) moveY += 1;
            }

            if (moveX === 0 && moveY === 0) return;

            const moveLength = Math.hypot(moveX, moveY) || 1;
            const normalizedX = moveX / moveLength;
            const normalizedY = moveY / moveLength;
            const movementSpeed = (pressedKeys.KeyE ? player.speed * PLAYER_SPRINT_MULTIPLIER : player.speed);

            player.x += normalizedX * movementSpeed * deltaTime * (isMobileMode() ? mobileControlState.leftJoystick.strength : 1);
            player.y += normalizedY * movementSpeed * deltaTime * (isMobileMode() ? mobileControlState.leftJoystick.strength : 1);

            const minPosition = -MAP_HALF_SIZE + MAP_BORDER_THICKNESS + player.radius;
            const maxPosition = MAP_HALF_SIZE - MAP_BORDER_THICKNESS - player.radius;
            player.x = Math.max(minPosition, Math.min(maxPosition, player.x));
            player.y = Math.max(minPosition, Math.min(maxPosition, player.y));
        }

        function updateMobileAimCursor() {
            /* Mobile aiming treats the right joystick center as the player's
            position, then places the yellow aim marker around that center
            using the joystick direction and intensity. */
            if (!isMobileMode()) return;

            /* When the right joystick is idle we hide the mobile aim marker so
            the desktop mouse path remains the only visible cursor there. */
            if (!mobileControlState.rightJoystick.active || mobileControlState.rightJoystick.strength <= 0) {
                cursor.visible = false;
                cursor.x = canvas.width * 0.5;
                cursor.y = canvas.height * 0.5;
                return;
            }

            /* The maximum aim reach follows the smaller viewport side, which
            keeps portrait and landscape behavior consistent and bounded. */
            const maxAimDistance = Math.min(canvas.width, canvas.height) * 0.5;
            const aimDistance = maxAimDistance * mobileControlState.rightJoystick.strength;

            cursor.x = canvas.width * 0.5 + mobileControlState.rightJoystick.x * aimDistance;
            cursor.y = canvas.height * 0.5 + mobileControlState.rightJoystick.y * aimDistance;
            cursor.visible = true;
        }

        function updateCollectibleMagnetism(collectibles, deltaTime) {
            /* Collectibles start drifting once the blueArea reaches them, and
            the pull ramps up over time so the magnet effect feels gradual. */
            const blueAreaRadius = getBlueAreaRadius();

            for (let i = 0; i < collectibles.length; i += 1) {
                const collectible = collectibles[i];
                const dx = player.x - collectible.x;
                const dy = player.y - collectible.y;
                const distance = Math.hypot(dx, dy);
                const insideBlueArea = distance <= blueAreaRadius + collectible.radius;

                if (insideBlueArea) {
                    collectible.magnetStrength = Math.min(
                        COLLECTIBLE_MAGNET_MAX_STRENGTH,
                        collectible.magnetStrength + COLLECTIBLE_ATTRACTION_SPEED * deltaTime
                    );
                } else {
                    collectible.magnetStrength = Math.max(
                        0,
                        collectible.magnetStrength - COLLECTIBLE_ATTRACTION_SPEED * 1.4 * deltaTime
                    );
                }

                if (distance > 0.001 && collectible.magnetStrength > 0) {
                    const directionX = dx / distance;
                    const directionY = dy / distance;
                    collectible.velocityX += directionX * collectible.magnetStrength * deltaTime;
                    collectible.velocityY += directionY * collectible.magnetStrength * deltaTime;
                }

                const dragMultiplier = Math.max(0, 1 - COLLECTIBLE_MAGNET_DRAG * deltaTime);
                collectible.velocityX *= dragMultiplier;
                collectible.velocityY *= dragMultiplier;
                collectible.x += collectible.velocityX * deltaTime;
                collectible.y += collectible.velocityY * deltaTime;
                clampWorldPosition(collectible);
            }
        }

        function moveEntityToward(entity, targetX, targetY, speed, deltaTime) {
            /* Shared directional movement keeps ally steering readable and
            avoids repeating the same normalize-and-step logic. */
            const dx = targetX - entity.x;
            const dy = targetY - entity.y;
            const distance = Math.hypot(dx, dy);
            if (distance <= 0.001) return distance;

            const step = Math.min(distance, speed * deltaTime);
            entity.x += (dx / distance) * step;
            entity.y += (dy / distance) * step;
            return distance;
        }

        function clampWorldPosition(entity) {
            const minPosition = -MAP_HALF_SIZE + MAP_BORDER_THICKNESS + entity.radius;
            const maxPosition = MAP_HALF_SIZE - MAP_BORDER_THICKNESS - entity.radius;
            entity.x = Math.max(minPosition, Math.min(maxPosition, entity.x));
            entity.y = Math.max(minPosition, Math.min(maxPosition, entity.y));
        }

        function updateAlly(deltaTime) {
            /* The ally keeps a loose orbit around the player, but it will break
            formation to intercept and melee enemies inside its defense area. */
            ally.attackCooldown = Math.max(0, ally.attackCooldown - deltaTime);

            let targetEnemy = null;
            let nearestEnemyDistance = Infinity;
            for (let i = 0; i < enemyDots.length; i += 1) {
                const enemy = enemyDots[i];
                const distance = Math.hypot(enemy.x - ally.x, enemy.y - ally.y);
                if (distance > ALLY_AREA_RADIUS + enemy.radius) continue;
                if (distance >= nearestEnemyDistance) continue;
                nearestEnemyDistance = distance;
                targetEnemy = enemy;
            }

            if (targetEnemy) {
                const distanceToEnemy = Math.hypot(targetEnemy.x - ally.x, targetEnemy.y - ally.y);
                if (distanceToEnemy > ALLY_ATTACK_RANGE) {
                    moveEntityToward(ally, targetEnemy.x, targetEnemy.y, ally.speed, deltaTime);
                } else if (ally.attackCooldown <= 0) {
                    targetEnemy.health = Math.max(0, targetEnemy.health - ALLY_ATTACK_DAMAGE);
                    targetEnemy.hitFlash = 0.15;
                    ally.attackCooldown = ALLY_ATTACK_INTERVAL;
                }
            } else {
                const dx = player.x - ally.x;
                const dy = player.y - ally.y;
                const distanceToPlayer = Math.hypot(dx, dy);
                const safeDistance = distanceToPlayer || 1;
                const offsetX = distanceToPlayer > 0.001 ? (ally.x - player.x) / safeDistance : 1;
                const offsetY = distanceToPlayer > 0.001 ? (ally.y - player.y) / safeDistance : 0;
                const targetX = player.x + offsetX * ALLY_STANDOFF_DISTANCE;
                const targetY = player.y + offsetY * ALLY_STANDOFF_DISTANCE;

                /* Following a point on the standoff ring is smoother than
                flipping between direct chase and direct retreat vectors. */
                if (Math.abs(distanceToPlayer - ALLY_STANDOFF_DISTANCE) > ALLY_STANDOFF_TOLERANCE) {
                    moveEntityToward(ally, targetX, targetY, ally.speed, deltaTime);
                }
            }

            clampWorldPosition(ally);
        }

        function updateEnemies(deltaTime) {
            /* Enemies wander by default, chase inside the detection radius, stop
            near the player, and only abandon the chase once the player is well
            outside their awareness range to avoid jittery state flipping. */
            for (let i = 0; i < enemyDots.length; i += 1) {
                const enemy = enemyDots[i];
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const distance = Math.hypot(dx, dy);
                enemy.projectileCooldown = Math.max(0, enemy.projectileCooldown - deltaTime);
                enemy.meleeAttackCooldown = Math.max(0, (enemy.meleeAttackCooldown || 0) - deltaTime);

                if (enemy.chasing) {
                    if (distance > enemy.disengageDistance) {
                        enemy.chasing = false;
                        enemy.wanderTimer = 0;
                    }
                } else if (distance <= enemy.detectionDistance) {
                    enemy.chasing = true;
                }

                if (enemy.chasing) {
                    if (distance > enemy.stopDistance) {
                        const safeDistance = distance || 1;
                        enemy.x += (dx / safeDistance) * enemy.speed * deltaTime;
                        enemy.y += (dy / safeDistance) * enemy.speed * deltaTime;
                    }

                    /* Melee enemies attack while holding their close standoff
                    range, so they do not need literal sprite overlap to hurt. */
                    if (!enemy.shoots && enemy.touchDamage > 0 && distance <= enemy.stopDistance + 6 && enemy.meleeAttackCooldown <= 0) {
                        player.health = Math.max(0, player.health - enemy.touchDamage);
                        player.hitFlash = 0.1;
                        enemy.meleeAttackCooldown = enemy.meleeAttackInterval;
                    }

                    if (enemy.shoots && distance <= enemy.stopDistance + 20 && enemy.projectileCooldown <= 0) {
                        const safeDistance = distance || 1;
                        enemyProjectiles.push({
                            x: enemy.x + (dx / safeDistance) * (enemy.radius + 6),
                            y: enemy.y + (dy / safeDistance) * (enemy.radius + 6),
                            velocityX: (dx / safeDistance) * 300,
                            velocityY: (dy / safeDistance) * 300,
                            radius: ENEMY_PROJECTILE_RADIUS,
                            life: ENEMY_PROJECTILE_LIFE,
                        });
                        enemy.projectileCooldown = enemy.projectileInterval;
                    }
                } else {
                    enemy.wanderTimer -= deltaTime;
                    if (enemy.wanderTimer <= 0) {
                        enemy.wanderAngle = Math.random() * Math.PI * 2;
                        enemy.wanderTimer = 0.45 + Math.random() * 1.6;
                    }

                    enemy.x += Math.cos(enemy.wanderAngle) * enemy.speed * 0.45 * deltaTime;
                    enemy.y += Math.sin(enemy.wanderAngle) * enemy.speed * 0.45 * deltaTime;
                }

                clampWorldPosition(enemy);
            }
        }

        function updatePacifists(deltaTime) {
            /* Pacifists only wander, giving the world some motion without
            turning every living dot into another combatant. */
            for (let i = 0; i < pacifistDots.length; i += 1) {
                const pacifist = pacifistDots[i];
                pacifist.wanderTimer -= deltaTime;

                if (pacifist.wanderTimer <= 0) {
                    pacifist.wanderAngle = Math.random() * Math.PI * 2;
                    pacifist.wanderTimer = 0.4 + Math.random() * 1.9;
                }

                pacifist.x += Math.cos(pacifist.wanderAngle) * pacifist.speed * deltaTime;
                pacifist.y += Math.sin(pacifist.wanderAngle) * pacifist.speed * deltaTime;
                clampWorldPosition(pacifist);
            }
        }

        function resolveActorCollisions() {
            /* Living actors should feel solid against each other, so the same
            separation pass handles ally, enemies, and pacifists consistently. */
            const actors = [ally, ...enemyDots, ...pacifistDots];

            /* The player acts as the camera anchor, so other actors get pushed
            away from the player instead of moving the player itself. */
            for (let i = 0; i < actors.length; i += 1) {
                const actor = actors[i];
                const dx = actor.x - player.x;
                const dy = actor.y - player.y;
                const distance = Math.hypot(dx, dy);
                const minDistance = player.radius + actor.radius;

                if (distance === 0) {
                    actor.x += minDistance;
                    clampWorldPosition(actor);
                    continue;
                }

                if (distance >= minDistance) continue;

                const overlap = minDistance - distance;
                const pushX = dx / distance;
                const pushY = dy / distance;
                actor.x += pushX * overlap;
                actor.y += pushY * overlap;
                clampWorldPosition(actor);
            }

            /* Actor-to-actor separation prevents ally, pacifists, and enemies
            from stacking into each other while they all navigate the map. */
            for (let i = 0; i < actors.length; i += 1) {
                const actorA = actors[i];
                for (let j = i + 1; j < actors.length; j += 1) {
                    const actorB = actors[j];
                    const dx = actorB.x - actorA.x;
                    const dy = actorB.y - actorA.y;
                    const distance = Math.hypot(dx, dy);
                    const minDistance = actorA.radius + actorB.radius;

                    if (distance === 0) {
                        actorA.x -= minDistance * 0.5;
                        actorB.x += minDistance * 0.5;
                        clampWorldPosition(actorA);
                        clampWorldPosition(actorB);
                        continue;
                    }

                    if (distance >= minDistance) continue;

                    const overlap = minDistance - distance;
                    const pushX = dx / distance;
                    const pushY = dy / distance;
                    actorA.x -= pushX * overlap * 0.5;
                    actorA.y -= pushY * overlap * 0.5;
                    actorB.x += pushX * overlap * 0.5;
                    actorB.y += pushY * overlap * 0.5;
                    clampWorldPosition(actorA);
                    clampWorldPosition(actorB);
                }
            }
        }

        function updateFoodCollisions() {
            /* Because the player is the camera anchor, food collision can be
            tested directly in world space using the player's own coordinates. */
            for (let i = foodDots.length - 1; i >= 0; i -= 1) {
                const food = foodDots[i];
                const distance = Math.hypot(food.x - player.x, food.y - player.y);
                if (distance <= player.radius + food.radius) {
                    foodDots.splice(i, 1);

                    /* Food doubles as a simple healing pickup for now so the
                    HUD bar has meaningful recovery feedback during combat. */
                    player.health = Math.min(player.maxHealth, player.health + 8);
                }
            }
        }

        function updateCoinCollisions() {
            /* Coins currently behave like food pickups: touching them removes
            them from the map until we add inventory, score, or currency use. */
            for (let i = coinDots.length - 1; i >= 0; i -= 1) {
                const coin = coinDots[i];
                const distance = Math.hypot(coin.x - player.x, coin.y - player.y);
                if (distance <= player.radius + coin.radius) {
                    coinDots.splice(i, 1);

                    /* Coins already exist as pickups in the world, so the HUD
                    can expose them immediately as a visible progression count. */
                    player.coins += 1;
                }
            }
        }

        function updateEnemyProjectiles(deltaTime) {
            /* Enemy bullets pressure the player from range, but stay simple for
            now by only flashing the player on hit instead of adding full health. */
            for (let i = enemyProjectiles.length - 1; i >= 0; i -= 1) {
                const projectile = enemyProjectiles[i];
                projectile.x += projectile.velocityX * deltaTime;
                projectile.y += projectile.velocityY * deltaTime;
                projectile.life -= deltaTime;

                const maxTravel = MAP_HALF_SIZE - MAP_BORDER_THICKNESS - projectile.radius;
                const outsideMap =
                    projectile.x < -maxTravel
                    || projectile.x > maxTravel
                    || projectile.y < -maxTravel
                    || projectile.y > maxTravel;

                if (projectile.life <= 0 || outsideMap) {
                    enemyProjectiles.splice(i, 1);
                    continue;
                }

                const distanceToPlayer = Math.hypot(projectile.x - player.x, projectile.y - player.y);
                if (distanceToPlayer <= projectile.radius + player.radius) {
                    player.hitFlash = 0.15;
                    player.health = Math.max(0, player.health - 12);
                    enemyProjectiles.splice(i, 1);
                }
            }
        }

        function updatePlayerHitFlash(deltaTime) {
            player.hitFlash = Math.max(0, player.hitFlash - deltaTime);
        }

        function updateEnemyHitFlash(deltaTime) {
            /* Enemy hit flashes decay independently so each target can briefly
            show impact feedback even while the group keeps moving normally. */
            for (let i = enemyDots.length - 1; i >= 0; i -= 1) {
                const enemy = enemyDots[i];
                enemy.hitFlash = Math.max(0, enemy.hitFlash - deltaTime);
                if (enemy.health <= 0) {
                    enemyDots.splice(i, 1);
                }
            }

            /* Pacifists can also be harmed, so they need the same temporary
            hit feedback and cleanup path as hostile entities. */
            for (let i = pacifistDots.length - 1; i >= 0; i -= 1) {
                const pacifist = pacifistDots[i];
                pacifist.hitFlash = Math.max(0, pacifist.hitFlash - deltaTime);
                if (pacifist.health <= 0) {
                    pacifistDots.splice(i, 1);
                }
            }
        }

        function spawnProjectile() {
            /* Shooting uses the cursor direction relative to the centered player,
            which keeps aiming intuitive for a topdown mouse-and-keyboard setup. */
            if (!cursor.visible) return;

            const aimX = cursor.x - canvas.width * 0.5;
            const aimY = cursor.y - canvas.height * 0.5;
            const aimLength = Math.hypot(aimX, aimY);
            if (aimLength < 1) return;

            const directionX = aimX / aimLength;
            const directionY = aimY / aimLength;
            projectiles.push({
                x: player.x + directionX * (player.radius + 10),
                y: player.y + directionY * (player.radius + 10),
                velocityX: directionX * 520,
                velocityY: directionY * 520,
                radius: PLAYER_PROJECTILE_RADIUS,
                life: PLAYER_PROJECTILE_LIFE,
            });
        }

        function updateProjectiles(deltaTime) {
            /* Projectiles advance, expire, and chip enemy health down in fixed
            chunks so combat can support tougher enemies than one-hit kills. */
            for (let i = projectiles.length - 1; i >= 0; i -= 1) {
              const projectile = projectiles[i];
              projectile.x += projectile.velocityX * deltaTime;
              projectile.y += projectile.velocityY * deltaTime;
              projectile.life -= deltaTime;

              const maxTravel = MAP_HALF_SIZE - MAP_BORDER_THICKNESS - projectile.radius;
              const outsideMap =
                projectile.x < -maxTravel
                || projectile.x > maxTravel
                || projectile.y < -maxTravel
                || projectile.y > maxTravel;

              if (projectile.life <= 0 || outsideMap) {
                projectiles.splice(i, 1);
                continue;
              }

              let hitEnemy = false;
              for (let enemyIndex = enemyDots.length - 1; enemyIndex >= 0; enemyIndex -= 1) {
                const enemy = enemyDots[enemyIndex];
                const distance = Math.hypot(enemy.x - projectile.x, enemy.y - projectile.y);
                if (distance > enemy.radius + projectile.radius) continue;

                enemy.health = Math.max(0, enemy.health - PLAYER_PROJECTILE_DAMAGE);
                enemy.hitFlash = 0.15;
                if (enemy.health <= 0) {
                    enemyDots.splice(enemyIndex, 1);
                }
                projectiles.splice(i, 1);
                hitEnemy = true;
                break;
              }

              if (hitEnemy) continue;

              for (let pacifistIndex = pacifistDots.length - 1; pacifistIndex >= 0; pacifistIndex -= 1) {
                const pacifist = pacifistDots[pacifistIndex];
                const distance = Math.hypot(pacifist.x - projectile.x, pacifist.y - projectile.y);
                if (distance > pacifist.radius + projectile.radius) continue;

                pacifist.health = Math.max(0, pacifist.health - PLAYER_PROJECTILE_DAMAGE);
                pacifist.hitFlash = 0.15;
                if (pacifist.health <= 0) {
                    pacifistDots.splice(pacifistIndex, 1);
                }
                projectiles.splice(i, 1);
                hitEnemy = true;
                break;
              }

              if (hitEnemy) continue;
            }
        }

        function render() {
            drawFloor();
            drawGroundPatches();
            drawMapBorders();
            drawBlueArea();
            drawAllyArea();
            drawFoodDots();
            drawCoinDots();
            drawPacifistDots();
            drawEnemyDots();
            drawAimLine();
            drawPlayer();
            drawAlly();
            drawCursor();
            drawEnemyProjectiles();
            drawProjectiles();
        }

        function frame(timestamp) {
            const deltaTime = Math.min((timestamp - lastFrameTime) / 1000 || 0, 0.05);
            lastFrameTime = timestamp;

            updateFpsCounter(deltaTime);
            updatePlayer(deltaTime);
            updateMobileAimCursor();
            updateCollectibleMagnetism(foodDots, deltaTime);
            updateCollectibleMagnetism(coinDots, deltaTime);
            updateAlly(deltaTime);
            updatePacifists(deltaTime);
            updateEnemies(deltaTime);
            resolveActorCollisions();
            updateFoodCollisions();
            updateCoinCollisions();
            updateEnemyProjectiles(deltaTime);
            updateProjectiles(deltaTime);
            updatePlayerDeath();
            updatePlayerHitFlash(deltaTime);
            updateEnemyHitFlash(deltaTime);
            updatePlayerHud();
            render();
            window.requestAnimationFrame(frame);
        }

        window.addEventListener('keydown', event => {
            pressedKeys[event.code] = true;
        });

        window.addEventListener('keyup', event => {
            pressedKeys[event.code] = false;
        });

        canvas.addEventListener('pointermove', event => {
            if (isMobileMode()) return;
            cursor.x = event.clientX;
            cursor.y = event.clientY;
            cursor.visible = true;
        });

        canvas.addEventListener('pointerenter', event => {
            if (isMobileMode()) return;
            cursor.x = event.clientX;
            cursor.y = event.clientY;
            cursor.visible = true;
        });

        canvas.addEventListener('pointerleave', () => {
            cursor.visible = false;
        });

        canvas.addEventListener('pointerdown', event => {
            if (isMobileMode()) return;
            if (event.button !== 0) return;
            spawnProjectile();
        });

        window.addEventListener('blur', () => {
            cursor.visible = false;
        });

        window.addEventListener('resize', () => {
            updateAppMode();
            resizeCanvas();
            cursor.x = canvas.width * 0.5;
            cursor.y = canvas.height * 0.5;
            render();
        });

        bindVirtualJoystick(leftJoystickElement, mobileControlState.leftJoystick);
        bindVirtualJoystick(rightJoystickElement, mobileControlState.rightJoystick);
        bindMobileButton('Left0');
        bindMobileButton('Left1');
        bindMobileButton('Left2');
        bindMobileButton('buttonUp');
        bindMobileButton('buttonShoot');
        bindMobileButton('Right1');
        bindMobileButton('Right2');
        bindMobileButton('Right3');
        mobileModeQuery.addEventListener('change', updateAppMode);

        updateAppMode();
        resizeCanvas();
        initializeWorld();
        updatePlayerHud();
        window.requestAnimationFrame(frame);
    </script>
</body>

</html>
