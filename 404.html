<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dibesfer</title>
  <link rel="icon" type="image/x-icon" href="/assets/branding/favicon512.ico">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/web/aa_amor/style.css">

  <!-- FERSCRIPT.JS -->
  <script src="/ferscript.js"></script>
  <!-- SUPABASE cdn -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>
  <header></header>

  <main>

    <div class="flexgrid">
      <div class="flexgriditem">
        <h2>404 - Not found</h2>
        <p>There is no <span id="showHref"></span> page</p>
        <p>May want to come back <a href="/">home</a>?</p>
        <div class="zoomableimage">
          <img width="100%"
            src="https://upload.wikimedia.org/wikipedia/commons/c/c3/NGC_4414_%28NASA-med%29.jpg">
        </div>
        <p>Where are we? What is me? Where are we going to?</p>

      </div>

    </div>

  </main>

  <footer></footer>
  <script>
    showHref.textContent = window.location.href.split("https://dibesfer.com")[1]
  </script>
  <script src="/web/aa_amor/script.js"></script>
  <script src="/assets/scripts/supabase.js"></script>
  <!-- 6. ADD LOAD SCRIPT -->
  <script>

    async function load(id, file) {
      fetch(file)
        .then(r => r.text())
        .then(html => gettag(id).innerHTML = html)
        .then(() => {

          fetch("/web/aa_amor/components/leftMenu.html")
            .then(a => a.text())
            .then(html => {
              gettag(id).innerHTML += html

              fetch("/web/aa_amor/components/rightMenu.html")
                .then(a => a.text())
                .then(html => {
                  gettag(id).innerHTML += html


                  fetch("/web/aa_amor/components/footer.html")
                    .then(a => a.text())
                    .then(html => {
                      gettag("footer").innerHTML = html
                    }).then(() => {
                      app()
                    })
                })
            })

        });
    }

    load("header", "/web/aa_amor/components/header.html");

  </script>
</body>

</html>
